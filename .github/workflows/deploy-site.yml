name: 部署 VitePress 学习网站

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'book/chapters/**/README.md'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

# 只允许一个并发部署，排队中的取消，正在运行的不中断
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要 git 历史以获取 lastUpdated

      - name: Materialize chapter assets (replace symlinks with real copies)
        run: |
          # MD-referenced assets go next to the page so VitePress can resolve ![]() imports.
          # Runtime assets (iframe demo, audio, slide downloads) go into public/ so VitePress
          # ships them verbatim to dist/ without trying to process them as modules.
          MD_SUBS="diagrams images infographic"
          PUBLIC_SUBS="demo audio slides"
          cd site
          for ch_dir in chapters/*/; do
            ch=$(basename "$ch_dir")
            src="../book/chapters/$ch"
            [ -d "$src" ] || continue
            # Clear any author-machine symlinks
            find "$ch_dir" -maxdepth 1 -type l -delete
            for sub in $MD_SUBS; do
              if [ -d "$src/$sub" ]; then
                rm -rf "$ch_dir$sub"
                cp -r "$src/$sub" "$ch_dir$sub"
              fi
            done
            for sub in $PUBLIC_SUBS; do
              if [ -d "$src/$sub" ]; then
                mkdir -p "public/chapters/$ch"
                rm -rf "public/chapters/$ch/$sub"
                cp -r "$src/$sub" "public/chapters/$ch/$sub"
              fi
            done
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build VitePress
        working-directory: site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
