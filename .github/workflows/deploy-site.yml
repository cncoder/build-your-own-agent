name: 部署 VitePress 学习网站

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'book/chapters/**/README.md'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

# 只允许一个并发部署，排队中的取消，正在运行的不中断
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要 git 历史以获取 lastUpdated

      - name: Resolve symlinks in site/chapters
        run: |
          cd site/chapters
          for dir in */; do
            if [ -L "${dir%/}" ] || find "$dir" -type l | head -1 | grep -q .; then
              temp=$(mktemp -d)
              cp -rL "$dir" "$temp/"
              rm -rf "$dir"
              mv "$temp/$(basename $dir)" "$dir"
              rm -rf "$temp"
            fi
          done
          # Copy diagrams/images into each chapter dir for VitePress to resolve
          for ch in */; do
            src="../../book/chapters/${ch%/}"
            if [ -d "$src/diagrams" ]; then
              cp -r "$src/diagrams" "${ch}diagrams" 2>/dev/null || true
            fi
            if [ -d "$src/images" ]; then
              cp -r "$src/images" "${ch}images" 2>/dev/null || true
            fi
            if [ -d "$src/infographic" ]; then
              cp -r "$src/infographic" "${ch}infographic" 2>/dev/null || true
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build VitePress
        working-directory: site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
