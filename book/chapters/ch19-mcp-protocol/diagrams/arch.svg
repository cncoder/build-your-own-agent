<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#080818"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a855f7"/>
    </marker>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#f1f5f9">Lena MCP 架构图</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748b">lena-v1.5 · 三个 MCP Server 接入</text>

  <!-- Lena AgentLoop box -->
  <rect x="60" y="70" width="780" height="200" rx="16" fill="rgba(168,85,247,0.05)" stroke="rgba(168,85,247,0.25)" stroke-width="1.5"/>
  <text x="450" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#a855f7" letter-spacing="0.05em">LENA AGENTLOOP</text>

  <!-- Components inside -->
  <rect x="80" y="104" width="150" height="50" rx="8" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="155" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#a855f7">LLM</text>
  <text x="155" y="140" text-anchor="middle" font-size="10" fill="#64748b">Anthropic Claude</text>

  <line x1="230" y1="129" x2="254" y2="129" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="255" y="104" width="160" height="50" rx="8" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="335" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#22d3ee">ToolRegistry</text>
  <text x="335" y="140" text-anchor="middle" font-size="10" fill="#64748b">工具发现 + 路由</text>

  <line x1="415" y1="129" x2="439" y2="129" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrC)"/>

  <rect x="440" y="104" width="160" height="50" rx="8" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="520" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#4ade80">MCPClient</text>
  <text x="520" y="140" text-anchor="middle" font-size="10" fill="#64748b">5步 stdio JSON-RPC</text>

  <line x1="600" y1="129" x2="624" y2="129" stroke="#4ade80" stroke-width="1.5"/>
  <text x="660" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">结果回传</text>
  <line x1="624" y1="129" x2="780" y2="129" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Internal detail row -->
  <text x="155" y="186" text-anchor="middle" font-size="10" fill="#64748b">tool_use 决策</text>
  <text x="335" y="186" text-anchor="middle" font-size="10" fill="#64748b">fs__ / gh__ / bs__</text>
  <text x="520" y="180" text-anchor="middle" font-size="10" fill="#4ade80">_read_loop</text>
  <text x="520" y="196" text-anchor="middle" font-size="10" fill="#f87171">_stderr_loop ← 必须!</text>
  <text x="520" y="212" text-anchor="middle" font-size="10" fill="#64748b">asyncio.Future</text>
  <text x="520" y="228" text-anchor="middle" font-size="10" fill="#64748b">set_result</text>

  <!-- Arrows down to subprocesses -->
  <line x1="300" y1="270" x2="200" y2="330" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrC)"/>
  <line x1="450" y1="270" x2="450" y2="330" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrC)"/>
  <line x1="600" y1="270" x2="700" y2="330" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrC)"/>

  <text x="280" y="310" font-size="11" fill="#64748b">stdio</text>
  <text x="455" y="316" font-size="11" fill="#64748b">stdio</text>
  <text x="640" y="310" font-size="11" fill="#64748b">stdio</text>

  <!-- Subprocess boxes -->
  <!-- filesystem -->
  <rect x="80" y="334" width="230" height="130" rx="12" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="195" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#22d3ee">📁 filesystem</text>
  <text x="195" y="374" text-anchor="middle" font-size="10" fill="#64748b">子进程（MCP server）</text>
  <text x="100" y="394" font-size="11" fill="rgba(34,211,238,0.8)">stdout → 消息</text>
  <text x="100" y="410" font-size="11" fill="rgba(248,113,113,0.8)">stderr → <tspan font-weight="700">排空</tspan></text>
  <text x="100" y="430" font-size="10" fill="#64748b">read_file / write_file</text>
  <text x="100" y="446" font-size="10" fill="#64748b">list_directory / search_files</text>

  <!-- github -->
  <rect x="335" y="334" width="230" height="130" rx="12" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="450" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#a855f7">🐙 github</text>
  <text x="450" y="374" text-anchor="middle" font-size="10" fill="#64748b">子进程（MCP server）</text>
  <text x="354" y="394" font-size="11" fill="rgba(168,85,247,0.8)">stdout → 消息</text>
  <text x="354" y="410" font-size="11" fill="rgba(248,113,113,0.8)">stderr → <tspan font-weight="700">排空</tspan></text>
  <text x="354" y="430" font-size="10" fill="#64748b">search_repos / get_file</text>
  <text x="354" y="446" font-size="10" fill="#64748b">create_issue / list_commits</text>

  <!-- brave-search -->
  <rect x="590" y="334" width="230" height="130" rx="12" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <text x="705" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#fb923c">🔍 brave-search</text>
  <text x="705" y="374" text-anchor="middle" font-size="10" fill="#64748b">子进程（MCP server）</text>
  <text x="610" y="394" font-size="11" fill="rgba(251,146,60,0.8)">stdout → 消息</text>
  <text x="610" y="410" font-size="11" fill="rgba(248,113,113,0.8)">stderr → <tspan font-weight="700">排空</tspan></text>
  <text x="610" y="430" font-size="10" fill="#64748b">brave_web_search</text>
  <text x="610" y="446" font-size="10" fill="#64748b">需要 BRAVE_API_KEY</text>

  <!-- stderr warning annotation -->
  <rect x="80" y="490" width="740" height="42" rx="8" fill="rgba(248,113,113,0.07)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
  <text x="450" y="508" text-anchor="middle" font-size="12" font-weight="700" fill="#f87171">⚠ 每个子进程的 stderr 都必须有单独的 _stderr_loop() 排空</text>
  <text x="450" y="524" text-anchor="middle" font-size="11" fill="rgba(248,113,113,0.7)">PIPE_BUF（4KB~64KB）满 → write() 阻塞 → 子进程挂死 → 整个 MCP 连接死锁</text>

  <!-- Footer -->
  <text x="450" y="572" text-anchor="middle" font-size="11" fill="#4a5568">nanoClaw/nanoclaw/mcp/client.py :177-191 · R2-openclaw-nanoclaw-comparison.md §5</text>
</svg>
