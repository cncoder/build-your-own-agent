<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Ch05 · 流式与并发：让 Agent 不卡顿</title>
<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-cover.html",       label: "封面" },
    { file: "slides/02-problem.html",     label: "问题引入" },
    { file: "slides/03-sse-protocol.html",label: "SSE 协议" },
    { file: "slides/04-sse-compare.html", label: "三家 SSE 对比" },
    { file: "slides/05-earlyrun.html",    label: "流式抢跑机制" },
    { file: "slides/06-concurrency.html", label: "并发上限 10" },
    { file: "slides/07-asyncio.html",     label: "asyncio.gather" },
    { file: "slides/08-edge-cases.html",  label: "Edge Cases" },
    { file: "slides/09-demo.html",        label: "终端演示" },
    { file: "slides/10-summary.html",     label: "本章小结" },
  ];
  window.DECK_WIDTH  = 1920;
  window.DECK_HEIGHT = 1080;
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #050810; overflow: hidden; font-family: -apple-system, "PingFang SC", sans-serif; }
  #stage {
    position: fixed; top: 50%; left: 50%;
    transform-origin: top left; will-change: transform;
    box-shadow: 0 20px 80px rgba(0,0,0,0.7);
  }
  iframe { width: 100%; height: 100%; border: 0; display: block; background: #050810; }
  .counter {
    position: fixed; bottom: 20px; right: 20px;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 6px 16px; border-radius: 999px;
    font-size: 13px; letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums; z-index: 100;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .counter .label { color: rgba(255,255,255,0.5); margin-left: 8px; font-size: 11px; }
  .nav-zone { position: fixed; top: 0; bottom: 0; width: 12%; cursor: pointer; z-index: 50; }
  .nav-zone.left { left: 0; } .nav-zone.right { right: 0; }
</style>
</head>
<body>
<div id="stage"><iframe id="frame" src=""></iframe></div>
<div class="counter"><span id="cur">1</span> / <span id="tot">10</span><span class="label" id="lbl"></span></div>
<div class="nav-zone left"  onclick="go(-1)"></div>
<div class="nav-zone right" onclick="go(+1)"></div>
<script>
  const manifest = window.DECK_MANIFEST;
  const W = window.DECK_WIDTH, H = window.DECK_HEIGHT;
  let idx = 0;

  function scale() {
    const s = Math.min(innerWidth / W, innerHeight / H);
    const stage = document.getElementById('stage');
    stage.style.width  = W + 'px';
    stage.style.height = H + 'px';
    stage.style.transform = `translate(-50%, -50%) scale(${s})`;
  }

  function load(i) {
    idx = Math.max(0, Math.min(manifest.length - 1, i));
    document.getElementById('frame').src = manifest[idx].file;
    document.getElementById('cur').textContent = idx + 1;
    document.getElementById('tot').textContent = manifest.length;
    document.getElementById('lbl').textContent = manifest[idx].label;
    history.replaceState(null, '', '?slide=' + (idx + 1));
  }

  function go(d) { load(idx + d); }

  window.addEventListener('resize', scale);
  scale();

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') go(+1);
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') go(-1);
    if (e.key === 'Home') load(0);
    if (e.key === 'End') load(manifest.length - 1);
    const n = parseInt(e.key);
    if (n >= 1 && n <= 9) load(n - 1);
  });

  const qs = new URLSearchParams(location.search).get('slide');
  load(qs ? parseInt(qs) - 1 : 0);
</script>
</body>
</html>
