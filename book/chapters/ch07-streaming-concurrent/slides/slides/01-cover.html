<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1920px; height: 1080px; overflow: hidden; background: #050810; font-family: "SF Pro Display", -apple-system, "PingFang SC", sans-serif; color: #fff; }

.bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 120% 80% at 70% 50%, #0a1a3a 0%, #050810 60%);
}

/* Grid lines */
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,150,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,150,255,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
}

/* Neon circle accent */
.ring {
  position: absolute; right: 160px; top: 50%;
  transform: translateY(-50%);
  width: 600px; height: 600px;
  border-radius: 50%;
  border: 1px solid rgba(0, 200, 255, 0.15);
  box-shadow: 0 0 60px rgba(0, 200, 255, 0.08), inset 0 0 60px rgba(0, 200, 255, 0.04);
}
.ring2 {
  position: absolute; right: 240px; top: 50%;
  transform: translateY(-50%);
  width: 440px; height: 440px;
  border-radius: 50%;
  border: 1px solid rgba(0, 200, 255, 0.1);
}
.ring3 {
  position: absolute; right: 320px; top: 50%;
  transform: translateY(-50%);
  width: 280px; height: 280px;
  border-radius: 50%;
  border: 1px solid rgba(0, 255, 200, 0.15);
  box-shadow: 0 0 40px rgba(0, 255, 200, 0.1);
}

/* SSE stream lines inside ring */
.stream-lines {
  position: absolute; right: 300px; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 10px;
  align-items: center;
}
.sline {
  height: 2px; border-radius: 2px;
  background: linear-gradient(90deg, transparent, #00c8ff, transparent);
  animation: stream 2s ease-in-out infinite;
}
@keyframes stream {
  0% { opacity: 0; transform: scaleX(0); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: scaleX(1); }
}

.content { position: absolute; left: 160px; top: 50%; transform: translateY(-50%); }

.ch-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(0, 200, 255, 0.08);
  border: 1px solid rgba(0, 200, 255, 0.25);
  border-radius: 6px;
  padding: 8px 20px; margin-bottom: 40px;
  font-size: 14px; letter-spacing: 0.15em; color: #00c8ff;
  text-transform: uppercase;
}
.ch-badge::before { content: '●'; font-size: 8px; animation: blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

h1 {
  font-size: 88px; font-weight: 700; line-height: 1.05;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 0%, #a0d8ff 50%, #00c8ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}

.subtitle {
  font-size: 36px; color: rgba(255,255,255,0.45); font-weight: 300;
  letter-spacing: 0.02em; margin-bottom: 56px;
}

.tags { display: flex; gap: 12px; flex-wrap: wrap; }
.tag {
  padding: 8px 18px; border-radius: 999px;
  font-size: 14px; letter-spacing: 0.05em;
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.04);
}
.tag.hot { border-color: rgba(0,200,255,0.4); color: #00c8ff; background: rgba(0,200,255,0.06); }

.bottom-bar {
  position: absolute; bottom: 48px; left: 160px; right: 160px;
  display: flex; align-items: center; gap: 0;
  border-top: 1px solid rgba(255,255,255,0.07); padding-top: 28px;
}
.lena-ver {
  font-size: 14px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em;
}
.lena-ver span { color: #00c8ff; }
.dot-sep { flex: 1; border-bottom: 1px dashed rgba(255,255,255,0.05); margin: 0 24px; }
.page-no { font-size: 13px; color: rgba(255,255,255,0.2); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<div class="ring"></div>
<div class="ring2"></div>
<div class="ring3"></div>

<!-- Animated stream lines inside ring -->
<div class="stream-lines">
  <div class="sline" style="width:120px; animation-delay:0s;"></div>
  <div class="sline" style="width:80px; animation-delay:0.3s;"></div>
  <div class="sline" style="width:140px; animation-delay:0.6s;"></div>
  <div class="sline" style="width:60px; animation-delay:0.9s;"></div>
  <div class="sline" style="width:100px; animation-delay:1.2s;"></div>
  <div class="sline" style="width:90px; animation-delay:1.5s;"></div>
  <div class="sline" style="width:130px; animation-delay:1.8s;"></div>
</div>

<div class="content">
  <div class="ch-badge">Ch 05 · 从零构建你的 AI Agent</div>
  <h1>流式与并发</h1>
  <p class="subtitle">让 Agent 不卡顿</p>
  <div class="tags">
    <span class="tag hot">SSE 流式输出</span>
    <span class="tag hot">工具并发抢跑</span>
    <span class="tag">Anthropic × OpenAI × DeepSeek</span>
    <span class="tag">asyncio.gather</span>
    <span class="tag">lena-v0.5</span>
  </div>
</div>

<div class="bottom-bar">
  <span class="lena-ver">产物：<span>lena-v0.5</span> — SSE 流式 + 5 工具并发</span>
  <div class="dot-sep"></div>
  <span class="page-no">01 / 10</span>
</div>
</body>
</html>
