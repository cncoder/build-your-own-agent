<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
    <!-- Arrow right -->
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#64748b"/>
    </marker>
    <!-- Arrow right cyan -->
    <marker id="arr-cyan" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#06b6d4"/>
    </marker>
    <!-- Arrow right violet -->
    <marker id="arr-violet" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#8b5cf6"/>
    </marker>
    <!-- Arrow down -->
    <marker id="arr-d" markerWidth="9" markerHeight="9" refX="3.5" refY="2" orient="auto">
      <path d="M0,0 L7,0 L3.5,9 z" fill="#64748b"/>
    </marker>
    <!-- Cyan down -->
    <marker id="arr-d-cyan" markerWidth="9" markerHeight="9" refX="3.5" refY="2" orient="auto">
      <path d="M0,0 L7,0 L3.5,9 z" fill="#06b6d4"/>
    </marker>

    <filter id="box-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#06b6d4" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-violet" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-emerald" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#10b981" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">RAG 检索增强生成管线 · Retrieval-Augmented Generation Pipeline</text>

  <!-- ============================================================ -->
  <!-- LEFT: WRITE FLOW  (文档写入流)  y≈90-200 -->
  <!-- ============================================================ -->

  <!-- Section label -->
  <rect x="20" y="50" width="420" height="22" rx="4" fill="#0c1a2e"/>
  <text x="230" y="65" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="12" fill="#06b6d4" font-weight="600">▼ 索引写入流 · Index Write Flow</text>

  <!-- Node: 文档 Documents -->
  <rect x="20" y="82" width="88" height="58" rx="8" fill="#0e3a4a" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow-cyan)"/>
  <text x="64" y="105" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="18" fill="#06b6d4">📄</text>
  <text x="64" y="122" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#67e8f9">文档</text>
  <text x="64" y="134" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Documents</text>

  <!-- Arrow -->
  <line x1="108" y1="111" x2="130" y2="111" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-cyan)"/>

  <!-- Node: Chunk 分割 -->
  <rect x="132" y="82" width="88" height="58" rx="8" fill="#0e2a3a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="176" y="105" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#22d3ee">✂️</text>
  <text x="176" y="122" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#67e8f9">Chunk 分割</text>
  <text x="176" y="134" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Text Chunking</text>

  <!-- Arrow -->
  <line x1="220" y1="111" x2="242" y2="111" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-cyan)"/>

  <!-- Node: Embedding 向量化 -->
  <rect x="244" y="82" width="88" height="58" rx="8" fill="#1a0e3a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="288" y="105" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#a78bfa">🧠</text>
  <text x="288" y="122" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">Embedding</text>
  <text x="288" y="134" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Vectorization</text>

  <!-- Arrow -->
  <line x1="332" y1="111" x2="354" y2="111" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-cyan)"/>

  <!-- Node: 向量数据库 Vector DB -->
  <rect x="356" y="75" width="88" height="72" rx="8" fill="#0d2618" stroke="#10b981" stroke-width="2" filter="url(#glow-emerald)"/>
  <text x="400" y="103" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="18" fill="#10b981">🗄️</text>
  <text x="400" y="120" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#34d399">向量数据库</text>
  <text x="400" y="134" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Vector Database</text>
  <text x="400" y="145" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#6ee7b7">FAISS / pgvector</text>

  <!-- ============================================================ -->
  <!-- RIGHT: QUERY FLOW  (查询流)  y≈200-360 -->
  <!-- ============================================================ -->

  <!-- Separator -->
  <line x1="20" y1="178" x2="880" y2="178" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Section label -->
  <rect x="20" y="184" width="420" height="22" rx="4" fill="#1a0e2e"/>
  <text x="230" y="199" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="12" fill="#8b5cf6" font-weight="600">▼ 查询检索流 · Query &amp; Retrieval Flow</text>

  <!-- Node: 用户查询 User Query -->
  <rect x="20" y="215" width="88" height="58" rx="8" fill="#1a0e2e" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow-violet)"/>
  <text x="64" y="238" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#a78bfa">💬</text>
  <text x="64" y="255" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">用户查询</text>
  <text x="64" y="267" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">User Query</text>

  <!-- Arrow -->
  <line x1="108" y1="244" x2="130" y2="244" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Node: Embedding (query) -->
  <rect x="132" y="215" width="88" height="58" rx="8" fill="#1a0e3a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="176" y="238" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#a78bfa">🧠</text>
  <text x="176" y="255" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">Embedding</text>
  <text x="176" y="267" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Query Vector</text>

  <!-- Arrow -->
  <line x1="220" y1="244" x2="242" y2="244" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Node: 相似度搜索 Similarity Search -->
  <rect x="244" y="215" width="88" height="58" rx="8" fill="#1a1a0e" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="288" y="238" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#facc15">🔍</text>
  <text x="288" y="255" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#fde68a">相似度搜索</text>
  <text x="288" y="267" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Similarity Search</text>

  <!-- Query→VectorDB vertical connector from DB -->
  <line x1="400" y1="147" x2="400" y2="200" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="200" x2="288" y2="200" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="288" y1="200" x2="288" y2="214" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <text x="340" y="196" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#34d399">读取向量索引</text>

  <!-- Arrow -->
  <line x1="332" y1="244" x2="354" y2="244" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Node: Top-K 召回 -->
  <rect x="356" y="215" width="88" height="58" rx="8" fill="#1a0e0e" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="238" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#f87171">🏆</text>
  <text x="400" y="255" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#fca5a5">Top-K 召回</text>
  <text x="400" y="267" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Top-K Retrieval</text>

  <!-- Arrow -->
  <line x1="444" y1="244" x2="466" y2="244" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Node: Prompt 组装 Prompt Assembly -->
  <rect x="468" y="215" width="88" height="58" rx="8" fill="#1a1506" stroke="#b45309" stroke-width="1.5"/>
  <text x="512" y="238" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#f59e0b">📝</text>
  <text x="512" y="255" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#fcd34d">Prompt 组装</text>
  <text x="512" y="267" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Prompt Assembly</text>

  <!-- Arrow -->
  <line x1="556" y1="244" x2="578" y2="244" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Node: LLM 生成 -->
  <rect x="580" y="207" width="92" height="72" rx="8" fill="#0d1f2d" stroke="#0ea5e9" stroke-width="2" filter="url(#glow-cyan)"/>
  <text x="626" y="234" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="18" fill="#38bdf8">🤖</text>
  <text x="626" y="252" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#7dd3fc">LLM 生成</text>
  <text x="626" y="265" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">LLM Generation</text>
  <text x="626" y="275" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#38bdf8">Claude / GPT</text>

  <!-- Arrow -->
  <line x1="672" y1="244" x2="694" y2="244" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arr-cyan)"/>

  <!-- Node: 最终回答 Answer -->
  <rect x="696" y="215" width="88" height="58" rx="8" fill="#0d2618" stroke="#10b981" stroke-width="2" filter="url(#glow-emerald)"/>
  <text x="740" y="238" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#34d399">✅</text>
  <text x="740" y="255" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#6ee7b7">最终回答</text>
  <text x="740" y="267" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#94a3b8">Final Answer</text>

  <!-- ============================================================ -->
  <!-- Step labels below query flow -->
  <!-- ============================================================ -->
  <text x="64" y="290" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">① 接受问题</text>
  <text x="176" y="290" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">② 问题向量化</text>
  <text x="288" y="290" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">③ ANN 搜索</text>
  <text x="400" y="290" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">④ 取 Top-K 段落</text>
  <text x="512" y="290" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">⑤ 注入上下文</text>
  <text x="626" y="292" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">⑥ 推理生成</text>
  <text x="740" y="290" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">⑦ 返回用户</text>

  <!-- ============================================================ -->
  <!-- Write flow node labels (below) -->
  <!-- ============================================================ -->
  <text x="64" y="158" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">① 原始文档</text>
  <text x="176" y="158" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">② 滑动窗口切片</text>
  <text x="288" y="158" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">③ 生成向量</text>
  <text x="400" y="158" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="9" fill="#475569">④ 存储索引</text>

  <!-- ============================================================ -->
  <!-- Legend -->
  <!-- ============================================================ -->
  <rect x="460" y="82" width="420" height="88" rx="6" fill="#0c1929" stroke="#1e3a5f" stroke-width="1"/>
  <text x="670" y="100" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" font-weight="600" fill="#94a3b8">技术选型参考 · Tech Options</text>
  <text x="480" y="120" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="10" fill="#67e8f9">Chunking</text>
  <text x="560" y="120" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="10" fill="#94a3b8">512 tokens, 50 overlap</text>
  <text x="480" y="136" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="10" fill="#c4b5fd">Embedding</text>
  <text x="560" y="136" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="10" fill="#94a3b8">text-embedding-3-small / BGE</text>
  <text x="480" y="152" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="10" fill="#6ee7b7">Vector DB</text>
  <text x="560" y="152" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="10" fill="#94a3b8">FAISS / pgvector / Chroma</text>

  <!-- Bottom note -->
  <text x="450" y="345" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" fill="#475569">相似度度量 · Similarity: cosine similarity / dot product</text>
  <text x="450" y="362" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="11" fill="#475569">检索精度目标 · Retrieval Target: Recall@5 ≥ 0.85 on domain corpus</text>

</svg>
