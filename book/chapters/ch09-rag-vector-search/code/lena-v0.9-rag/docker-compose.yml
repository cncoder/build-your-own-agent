version: "3.9"

services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lena
      POSTGRES_PASSWORD: lena
      POSTGRES_DB: lena_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # schema.sql is copied into initdb.d — applied once on first container start
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lena -d lena_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
