  <line x1="425" y1="482" x2="425" y2="520" stroke="rgba(246,173,85,0.5)" stroke-width="1.5"/>
  <rect x="380" y="520" width="90" height="28" rx="6" fill="rgba(246,173,85,0.1)" stroke="rgba(246,173,85,0.3)" stroke-width="1"/>
  <text x="425" y="539" text-anchor="middle" font-size="14" fill="rgba(246,173,85,0.8)">回复</text>

