  <rect x="60" y="1072" width="320" height="148" rx="14" fill="rgba(104,211,145,0.07)" stroke="rgba(104,211,145,0.35)" stroke-width="1.5"/>
  <text x="220" y="1110" text-anchor="middle" font-size="15" fill="#68d391" font-weight="700">active-hours</text>
  <text x="220" y="1134" text-anchor="middle" font-size="13" fill="rgba(226,232,240,0.6)">时区感知 工作时间过滤</text>
  <text x="80" y="1160" font-size="12" fill="rgba(226,232,240,0.5)" font-family="monospace">• timezone: Asia/HK</text>
