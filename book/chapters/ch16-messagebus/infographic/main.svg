  <text x="990" y="1868" class="t-label" text-anchor="middle" fill="#ef4444">broken</text>
  <text x="990" y="1908" class="t-body" text-anchor="middle" font-size="34px">handler B ⚡</text>

  <!-- Handler C -->
  <rect x="1180" y="1820" width="300" height="120" rx="14" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="2"/>
  <text x="1330" y="1868" class="t-label" text-anchor="middle" fill="#67e8f9">Logger</text>
  <text x="1330" y="1908" class="t-body" text-anchor="middle" font-size="34px">handler C</text>

  <!-- Arrows from Promise.all to handlers -->
  <line x1="890" y1="1760" x2="650" y2="1820" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-r)" opacity="0.7"/>
  <line x1="960" y1="1760" x2="990" y2="1820" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-r)" opacity="0.9"/>
  <line x1="1030" y1="1760" x2="1330" y2="1820" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-c)" opacity="0.7"/>

  <!-- Handler A result: success -->
  <line x1="650" y1="1940" x2="650" y2="2060" stroke="#4ade80" stroke-width="2" marker-end="url(#arr-g)"/>
  <rect x="480" y="2060" width="340" height="80" rx="10" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="650" y="2108" class="t-label" text-anchor="middle" fill="#4ade80">✓ 正常执行</text>

  <!-- Handler B result: error → catch → continue -->
  <line x1="990" y1="1940" x2="990" y2="2000" stroke="#ef4444" stroke-width="2"/>
  <!-- safeHandlerCall box -->
  <rect x="740" y="2000" width="500" height="160" rx="14" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="2"/>
  <text x="990" y="2048" class="t-label" text-anchor="middle" fill="#ef4444">try/catch</text>
  <text x="990" y="2092" class="t-body" text-anchor="middle" font-size="34px">safeHandlerCall</text>
  <text x="990" y="2136" class="t-code" text-anchor="middle" fill="#86efac" font-size="30px">logger.error(err) // 不 rethrow</text>

  <!-- Handler C result: success -->
  <line x1="1330" y1="1940" x2="1330" y2="2060" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr-c)"/>
  <rect x="1160" y="2060" width="340" height="80" rx="10" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="1330" y="2108" class="t-label" text-anchor="middle" fill="#67e8f9">✓ 正常执行</text>

  <!-- Key insight callout -->
  <rect x="1600" y="1580" width="1720" height="700" rx="24" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.25)" stroke-width="2"/>
  <text x="2460" y="1660" class="t-section" text-anchor="middle" fill="#c084fc">核心代码（8行）</text>
  <!-- Code block -->
  <rect x="1660" y="1700" width="1600" height="400" rx="14" fill="rgba(0,0,0,0.5)" stroke="#1e293b" stroke-width="1.5"/>
  <text x="1700" y="1760" class="t-code" fill="#94a3b8">// nano-claw bus/index.ts:92-99</text>
  <text x="1700" y="1820" class="t-code" fill="#c084fc">private async</text>
  <text x="1970" y="1820" class="t-code" fill="#67e8f9">safeHandlerCall</text>
  <text x="2380" y="1820" class="t-code" fill="#f1f5f9">(handler, message) {</text>
  <text x="1740" y="1880" class="t-code" fill="#c084fc">  try</text>
  <text x="1830" y="1880" class="t-code" fill="#f1f5f9">{ </text>
  <text x="1880" y="1880" class="t-code" fill="#c084fc">await</text>
  <text x="2000" y="1880" class="t-code" fill="#67e8f9">handler</text>
  <text x="2160" y="1880" class="t-code" fill="#f1f5f9">(message); }</text>
  <text x="1740" y="1940" class="t-code" fill="#c084fc">  catch</text>
  <text x="1880" y="1940" class="t-code" fill="#f1f5f9">(error) {</text>
  <text x="1780" y="2000" class="t-code" fill="#67e8f9">    logger</text>
  <text x="2030" y="2000" class="t-code" fill="#f1f5f9">.</text>
  <text x="2060" y="2000" class="t-code" fill="#67e8f9">error</text>
  <text x="2200" y="2000" class="t-code" fill="#f1f5f9">(</text>
  <text x="2240" y="2000" class="t-code" fill="#86efac">'Error in handler'</text>
  <text x="2680" y="2000" class="t-code" fill="#f1f5f9">, error);</text>
  <text x="1780" y="2060" class="t-code" fill="#64748b">    // 没有 rethrow ← 关键！</text>
  <text x="1740" y="2120" class="t-code" fill="#f1f5f9">  }</text>
  <text x="1700" y="2160" class="t-code" fill="#f1f5f9">}</text>

