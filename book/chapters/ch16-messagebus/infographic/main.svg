  <!-- ══════════════════════════════════════════════
       BOTTOM HALF: safeHandlerCall 流程图
       ══════════════════════════════════════════════ -->

  <!-- Divider -->
  <line x1="100" y1="1360" x2="3408" y2="1360" stroke="#1e293b" stroke-width="2"/>

  <text x="1754" y="1450" class="t-header" text-anchor="middle">safeHandlerCall 错误隔离机制</text>
  <text x="1754" y="1520" class="t-sub" text-anchor="middle">隔仓设计（Bulkhead Pattern）— 单个 handler 崩溃不影响其他 handler 继续执行</text>

  <!-- Flow diagram -->
  <!-- publish() -->
  <rect x="200" y="1580" width="400" height="140" rx="16" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="2.5"/>
  <text x="400" y="1636" class="t-label" text-anchor="middle" fill="#67e8f9">bus.publish(msg)</text>
  <text x="400" y="1680" class="t-body" text-anchor="middle" font-size="34px">发布消息</text>

  <!-- Arrow: publish → Promise.all -->
  <line x1="600" y1="1650" x2="760" y2="1650" stroke="#22d3ee" stroke-width="3" marker-end="url(#arr-c)"/>

  <!-- Promise.all -->
  <rect x="760" y="1580" width="400" height="140" rx="16" fill="rgba(168,85,247,0.12)" stroke="#a855f7" stroke-width="2.5"/>
  <text x="960" y="1636" class="t-label" text-anchor="middle" fill="#c084fc">Promise.all()</text>
  <text x="960" y="1680" class="t-body" text-anchor="middle" font-size="34px">并发执行所有 handler</text>

  <!-- Arrow down: Promise.all → handlers -->
  <line x1="960" y1="1720" x2="960" y2="1820" stroke="#a855f7" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- Handler A -->
  <rect x="500" y="1820" width="300" height="120" rx="14" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="2"/>
  <text x="650" y="1868" class="t-label" text-anchor="middle" fill="#4ade80">AgentLoop</text>
  <text x="650" y="1908" class="t-body" text-anchor="middle" font-size="34px">handler A</text>

  <!-- Handler B (broken) -->
