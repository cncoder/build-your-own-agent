<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="680" viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="channelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.04"/>
    </linearGradient>
    <marker id="arrPurple" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#a78bfa" opacity="0.9"/>
    </marker>
    <marker id="arrCyan" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#22d3ee" opacity="0.9"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#4ade80" opacity="0.9"/>
    </marker>
    <marker id="arrOrange" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#fb923c" opacity="0.9"/>
    </marker>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1100" height="680" fill="url(#bg)" rx="4"/>
  <rect width="1100" height="680" fill="url(#grid)"/>
  <!-- Ambient glows -->
  <ellipse cx="550" cy="340" rx="500" ry="280" fill="#a78bfa" opacity="0.025"/>
  <ellipse cx="700" cy="360" rx="300" ry="200" fill="#22d3ee" opacity="0.03"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" font-size="22" font-weight="700"
        fill="#f1f5f9" filter="url(#softGlow)">Ch 15 · Gateway 架构：从 CLI 到 Always-on</text>
  <text x="550" y="70" text-anchor="middle" font-size="13" fill="#64748b">
    Channel 是插件，核心不知道 Channel 的存在 | launchd 守护，崩溃自动重启
  </text>
  <line x1="180" y1="82" x2="920" y2="82" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>

  <!-- ====== External Clients (far left) ====== -->
  <!-- Telegram -->
  <rect x="20" y="130" width="145" height="68" rx="12"
        fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="1.3"/>
  <text x="92" y="157" text-anchor="middle" font-size="13" fill="#22d3ee" font-weight="600">Telegram</text>
  <text x="92" y="175" text-anchor="middle" font-size="11" fill="#64748b">polling / webhook</text>
  <text x="92" y="190" text-anchor="middle" font-size="10" fill="#475569">长连接维护</text>

  <!-- HTTP curl -->
  <rect x="20" y="222" width="145" height="68" rx="12"
        fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="1.3"/>
  <text x="92" y="249" text-anchor="middle" font-size="13" fill="#fb923c" font-weight="600">HTTP Client</text>
  <text x="92" y="267" text-anchor="middle" font-size="11" fill="#64748b">curl / webhook</text>
  <text x="92" y="282" text-anchor="middle" font-size="10" fill="#475569">POST /message</text>

  <!-- Console -->
  <rect x="20" y="314" width="145" height="68" rx="12"
        fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1.3"/>
  <text x="92" y="341" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="600">Console CLI</text>
  <text x="92" y="359" text-anchor="middle" font-size="11" fill="#64748b">stdin / stdout</text>
  <text x="92" y="374" text-anchor="middle" font-size="10" fill="#475569">本地调试专用</text>

  <!-- Discord (future) -->
  <rect x="20" y="406" width="145" height="68" rx="12"
        fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.35)" stroke-width="1"
        stroke-dasharray="5,3"/>
  <text x="92" y="433" text-anchor="middle" font-size="13" fill="#a78bfa" opacity="0.7">Discord</text>
  <text x="92" y="451" text-anchor="middle" font-size="11" fill="#475569">WebSocket</text>
  <text x="92" y="466" text-anchor="middle" font-size="10" fill="#374151">插件式扩展 →</text>

  <!-- Arrows: Clients → Gateway -->
  <line x1="165" y1="164" x2="245" y2="250" stroke="#22d3ee" stroke-width="1.8"
        marker-end="url(#arrCyan)"/>
  <line x1="165" y1="256" x2="245" y2="280" stroke="#fb923c" stroke-width="1.8"
        marker-end="url(#arrOrange)"/>
  <line x1="165" y1="348" x2="245" y2="320" stroke="#4ade80" stroke-width="1.8"
        marker-end="url(#arrGreen)"/>
  <line x1="165" y1="440" x2="245" y2="360" stroke="#a78bfa" stroke-width="1.4"
        stroke-dasharray="4,3" marker-end="url(#arrPurple)" opacity="0.6"/>

  <!-- ====== Gateway Server Box (center-left) ====== -->
  <rect x="245" y="110" width="280" height="460" rx="14"
        fill="url(#gwGrad)" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="385" y="140" text-anchor="middle" font-size="15" font-weight="700"
        fill="#a78bfa" filter="url(#softGlow)">Gateway Server</text>
  <text x="385" y="158" text-anchor="middle" font-size="11" fill="#64748b">219 行核心 / 常驻进程</text>
  <line x1="265" y1="168" x2="505" y2="168" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>

  <!-- WS Connections -->
  <rect x="263" y="182" width="120" height="68" rx="8"
        fill="rgba(167,139,250,0.10)" stroke="rgba(167,139,250,0.35)" stroke-width="1"/>
  <text x="323" y="207" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">WS Connections</text>
  <text x="323" y="225" text-anchor="middle" font-size="10" fill="#64748b">心跳 + 重连</text>
  <text x="323" y="241" text-anchor="middle" font-size="10" fill="#64748b">指数退避</text>

  <!-- HTTP Routes -->
  <rect x="395" y="182" width="115" height="68" rx="8"
        fill="rgba(251,146,60,0.10)" stroke="rgba(251,146,60,0.35)" stroke-width="1"/>
  <text x="452" y="207" text-anchor="middle" font-size="11" fill="#fb923c" font-weight="600">HTTP Routes</text>
  <text x="452" y="225" text-anchor="middle" font-size="10" fill="#64748b">POST /message</text>
  <text x="452" y="241" text-anchor="middle" font-size="10" fill="#64748b">GET /health</text>

  <!-- Channel Router -->
  <rect x="263" y="264" width="247" height="72" rx="8"
        fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.4"/>
  <text x="386" y="292" text-anchor="middle" font-size="13" fill="#a78bfa" font-weight="700">Channel Router</text>
  <text x="386" y="312" text-anchor="middle" font-size="11" fill="#94a3b8">根据 channel_id 路由消息</text>
  <text x="386" y="328" text-anchor="middle" font-size="11" fill="#64748b">channel.send(msg) / channel.recv()</text>

  <!-- Channel Plugin slots -->
  <rect x="263" y="350" width="247" height="52" rx="8"
        fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="386" y="374" text-anchor="middle" font-size="11" fill="#64748b">BaseChannel 插件接口</text>
  <text x="386" y="392" text-anchor="middle" font-size="11" fill="#a78bfa">register(channel) → 热插拔</text>

  <!-- launchd watchdog -->
  <rect x="263" y="416" width="247" height="56" rx="8"
        fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <text x="386" y="442" text-anchor="middle" font-size="12" fill="#fb923c" font-weight="600">launchd 守护</text>
  <text x="386" y="460" text-anchor="middle" font-size="11" fill="#94a3b8">崩溃 → 自动重启 → 5s</text>

  <!-- Message Queue -->
  <rect x="263" y="486" width="247" height="56" rx="8"
        fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="386" y="512" text-anchor="middle" font-size="12" fill="#22d3ee" font-weight="600">asyncio.Queue</text>
  <text x="386" y="530" text-anchor="middle" font-size="11" fill="#94a3b8">消息入队 → AgentLoop 消费</text>

  <!-- Arrow: Gateway → AgentLoop -->
  <line x1="525" y1="350" x2="620" y2="350" stroke="#22d3ee" stroke-width="2.2"
        marker-end="url(#arrCyan)"/>
  <text x="572" y="342" text-anchor="middle" font-size="11" fill="#22d3ee">消息路由</text>

  <!-- Arrow back -->
  <line x1="620" y1="370" x2="525" y2="370" stroke="#4ade80" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="572" y="388" text-anchor="middle" font-size="11" fill="#4ade80">回复</text>

  <!-- ====== AgentLoop Box (center-right) ====== -->
  <rect x="620" y="110" width="250" height="460" rx="14"
        fill="url(#agentGrad)" stroke="#22d3ee" stroke-width="1.8"/>
  <text x="745" y="140" text-anchor="middle" font-size="15" font-weight="700"
        fill="#22d3ee" filter="url(#softGlow)">AgentLoop</text>
  <text x="745" y="158" text-anchor="middle" font-size="11" fill="#64748b">永远运行中</text>
  <line x1="640" y1="168" x2="850" y2="168" stroke="#22d3ee" stroke-width="0.6" opacity="0.4"/>

  <!-- Loop iteration indicator -->
  <rect x="640" y="182" width="210" height="52" rx="8"
        fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="745" y="208" text-anchor="middle" font-size="12" fill="#22d3ee">while True:</text>
  <text x="745" y="226" text-anchor="middle" font-size="11" fill="#64748b">msg = await queue.get()</text>

  <rect x="640" y="248" width="210" height="52" rx="8"
        fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="745" y="272" text-anchor="middle" font-size="12" fill="#94a3b8">LLM 推理</text>
  <text x="745" y="290" text-anchor="middle" font-size="11" fill="#64748b">Claude API 调用</text>

  <rect x="640" y="314" width="210" height="52" rx="8"
        fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="745" y="338" text-anchor="middle" font-size="12" fill="#94a3b8">工具执行</text>
  <text x="745" y="356" text-anchor="middle" font-size="11" fill="#64748b">ToolRegistry.execute()</text>

  <rect x="640" y="380" width="210" height="52" rx="8"
        fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="745" y="404" text-anchor="middle" font-size="12" fill="#94a3b8">Memory 更新</text>
  <text x="745" y="422" text-anchor="middle" font-size="11" fill="#64748b">消息历史压缩</text>

  <rect x="640" y="446" width="210" height="52" rx="8"
        fill="rgba(74,222,128,0.10)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="745" y="470" text-anchor="middle" font-size="12" fill="#4ade80">回复路由</text>
  <text x="745" y="488" text-anchor="middle" font-size="11" fill="#64748b">channel.send(reply)</text>

  <!-- Memory Box -->
  <rect x="900" y="200" width="175" height="140" rx="12"
        fill="rgba(251,146,60,0.07)" stroke="rgba(251,146,60,0.3)" stroke-width="1.2"/>
  <text x="987" y="228" text-anchor="middle" font-size="13" fill="#fb923c" font-weight="600">Memory</text>
  <line x1="920" y1="236" x2="1055" y2="236" stroke="#fb923c" stroke-width="0.5" opacity="0.3"/>
  <text x="987" y="260" text-anchor="middle" font-size="11" fill="#94a3b8">消息历史</text>
  <text x="987" y="280" text-anchor="middle" font-size="11" fill="#94a3b8">autocompact</text>
  <text x="987" y="300" text-anchor="middle" font-size="11" fill="#94a3b8">向量搜索（可选）</text>
  <text x="987" y="324" text-anchor="middle" font-size="11" fill="#64748b">SQLite / 文件</text>

  <!-- Arrow: AgentLoop → Memory -->
  <line x1="870" y1="400" x2="900" y2="300" stroke="#fb923c" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>

  <!-- Tools Box -->
  <rect x="900" y="380" width="175" height="130" rx="12"
        fill="rgba(56,189,248,0.07)" stroke="rgba(56,189,248,0.3)" stroke-width="1.2"/>
  <text x="987" y="408" text-anchor="middle" font-size="13" fill="#38bdf8" font-weight="600">ToolRegistry</text>
  <line x1="920" y1="416" x2="1055" y2="416" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
  <text x="987" y="440" text-anchor="middle" font-size="11" fill="#94a3b8">read_file</text>
  <text x="987" y="460" text-anchor="middle" font-size="11" fill="#94a3b8">web_search</text>
  <text x="987" y="480" text-anchor="middle" font-size="11" fill="#94a3b8">shell</text>
  <text x="987" y="498" text-anchor="middle" font-size="11" fill="#64748b">+ 任意扩展</text>

  <!-- Arrow: AgentLoop → Tools -->
  <line x1="870" y1="460" x2="900" y2="450" stroke="#38bdf8" stroke-width="1.5"
        marker-end="url(#arrCyan)"/>

  <!-- Footer note -->
  <rect x="20" y="598" width="1060" height="60" rx="8"
        fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="550" y="622" text-anchor="middle" font-size="12" fill="#64748b">
    关键设计：Channel 是插件，AgentLoop 不 import 任何 Channel。
  </text>
  <text x="550" y="644" text-anchor="middle" font-size="12" fill="#94a3b8">
    新增 Discord / Slack → 只实现 BaseChannel，注册进 Gateway，零行核心代码变更。
  </text>
</svg>
