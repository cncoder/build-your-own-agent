<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#00d4ff"/>
    </marker>
    <style>
      text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif; fill: #e0e6f0; }
      .label { font-size: 13px; }
      .sublabel { font-size: 10px; fill: #8ba0b8; }
      .title { font-size: 15px; font-weight: bold; }
    </style>
  </defs>

  <rect width="800" height="320" fill="none"/>
  <text x="400" y="26" text-anchor="middle" class="title">Gateway / Channel 消息路由（Ch15）</text>

  <!-- Input channels on left -->
  <!-- Discord -->
  <rect x="30" y="55" width="120" height="46" rx="8" fill="#0c1220" stroke="#5865F2" stroke-width="1.5"/>
  <text x="90" y="75" text-anchor="middle" class="label">Discord</text>
  <text x="90" y="93" text-anchor="middle" class="sublabel">@Lena 消息触发</text>

  <!-- CLI -->
  <rect x="30" y="120" width="120" height="46" rx="8" fill="#0c1220" stroke="#4a6080" stroke-width="1.5"/>
  <text x="90" y="140" text-anchor="middle" class="label">CLI</text>
  <text x="90" y="158" text-anchor="middle" class="sublabel">终端交互 / 脚本调用</text>

  <!-- Web API -->
  <rect x="30" y="185" width="120" height="46" rx="8" fill="#0c1220" stroke="#4a6080" stroke-width="1.5"/>
  <text x="90" y="205" text-anchor="middle" class="label">Web API</text>
  <text x="90" y="223" text-anchor="middle" class="sublabel">HTTP / WebSocket</text>

  <!-- Cron / Heartbeat -->
  <rect x="30" y="250" width="120" height="46" rx="8" fill="#0c1220" stroke="#ffb347" stroke-width="1.5"/>
  <text x="90" y="270" text-anchor="middle" class="label">Cron</text>
  <text x="90" y="288" text-anchor="middle" class="sublabel" fill="#ffb347">心跳 / 定时任务</text>

  <!-- Arrows to Gateway -->
  <line x1="150" y1="78" x2="248" y2="148" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="143" x2="248" y2="158" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="208" x2="248" y2="170" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="265" x2="248" y2="178" stroke="#ffb347" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gateway box -->
  <rect x="250" y="118" width="140" height="80" rx="10" fill="#0c1220" stroke="#00d4ff" stroke-width="2"/>
  <text x="320" y="148" text-anchor="middle" class="label">Gateway</text>
  <text x="320" y="166" text-anchor="middle" class="sublabel">认证 · 限流 · 路由</text>
  <text x="320" y="182" text-anchor="middle" class="sublabel">协议统一封装</text>

  <!-- Arrow Gateway → MessageBus -->
  <line x1="390" y1="158" x2="448" y2="158" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MessageBus box -->
  <rect x="450" y="118" width="140" height="80" rx="10" fill="#0c1220" stroke="#4a80a0" stroke-width="2"/>
  <text x="520" y="148" text-anchor="middle" class="label">MessageBus</text>
  <text x="520" y="166" text-anchor="middle" class="sublabel">pub/sub 分发</text>
  <text x="520" y="182" text-anchor="middle" class="sublabel">优先级队列</text>

  <!-- Arrow MessageBus → Lena Core -->
  <line x1="590" y1="158" x2="648" y2="158" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lena Core -->
  <rect x="650" y="108" width="130" height="100" rx="10" fill="#0a2a14" stroke="#00ff88" stroke-width="2"/>
  <text x="715" y="140" text-anchor="middle" class="label" fill="#00ff88">Lena Core</text>
  <text x="715" y="158" text-anchor="middle" class="sublabel">AgentLoop</text>
  <text x="715" y="173" text-anchor="middle" class="sublabel">规划 · 工具调用</text>
  <text x="715" y="188" text-anchor="middle" class="sublabel">记忆 · 响应生成</text>

  <!-- Response back arrows (dashed) -->
  <path d="M 648 175 Q 535 245 455 220 Q 395 210 390 185" fill="none" stroke="#4a6080" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-rev)"/>
  <text x="525" y="240" text-anchor="middle" class="sublabel">响应回路（渠道感知路由）</text>

  <!-- Channel abstraction label -->
  <rect x="30" y="305" width="730" height="8" rx="4" fill="#1a3050" opacity="0.4"/>
  <text x="400" y="298" text-anchor="middle" class="sublabel">BaseChannel 抽象层：不同渠道实现相同接口（send / receive / format），Lena 无需关心输入来源</text>
</svg>
