  <line x1="432" y1="210" x2="478" y2="180" stroke="#00cc66" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="432" y1="270" x2="478" y2="310" stroke="#3399ff" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="432" y1="330" x2="478" y2="400" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3" opacity="0.6"/>

