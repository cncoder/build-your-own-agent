  <rect x="270" y="140" width="160" height="260" rx="8" fill="rgba(153,102,255,0.08)" stroke="rgba(153,102,255,0.4)" stroke-width="1.5"/>
  <text x="350" y="164" text-anchor="middle" fill="#cc88ff" font-size="9" letter-spacing="2">LENA-SPECKIT</text>
  <text x="350" y="186" text-anchor="middle" fill="white" font-size="15" font-weight="700">薄层脚手架</text>
  <line x1="284" y1="196" x2="416" y2="196" stroke="rgba(153,102,255,0.2)" stroke-width="1"/>
  <text x="350" y="222" text-anchor="middle" fill="rgba(153,102,255,0.7)" font-size="11" font-family="monospace">① prompt 特化</text>
  <text x="350" y="248" text-anchor="middle" fill="rgba(153,102,255,0.7)" font-size="11" font-family="monospace">② 工具集裁剪</text>
  <text x="350" y="274" text-anchor="middle" fill="rgba(153,102,255,0.7)" font-size="11" font-family="monospace">③ skills 注入</text>
  <line x1="284" y1="290" x2="416" y2="290" stroke="rgba(153,102,255,0.1)" stroke-width="1"/>
  <text x="350" y="316" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11" font-family="monospace">lena-spec create</text>
  <text x="350" y="336" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11" font-family="monospace">lena-spec fork</text>
  <text x="350" y="356" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11" font-family="monospace">lena-spec deploy</text>
  <text x="350" y="386" text-anchor="middle" fill="rgba(153,102,255,0.5)" font-size="9">薄层 · 不封装 LLM 调用</text>

