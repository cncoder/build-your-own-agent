  <text x="580" y="300" text-anchor="middle" fill="rgba(0,150,255,0.5)" font-size="10" font-family="monospace">4 tools · podcast-sop.md</text>
  <text x="580" y="320" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">案例 19.2: local-mactts</text>
  <text x="580" y="338" text-anchor="middle" fill="rgba(0,150,255,0.4)" font-size="10" font-family="monospace">RTF 0.49 · TTS 8880</text>

  <rect x="480" y="370" width="200" height="100" rx="8" fill="rgba(255,150,0,0.05)" stroke="rgba(255,150,0,0.3)" stroke-width="1.5"/>
  <text x="580" y="398" text-anchor="middle" fill="#ff9900" font-size="18" font-weight="800">DevOpsBot</text>
  <text x="580" y="420" text-anchor="middle" fill="rgba(255,150,0,0.5)" font-size="10" font-family="monospace">3 tools · devops-sop.md</text>
  <text x="580" y="440" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">AWS CloudWatch 监控</text>
  <text x="580" y="458" text-anchor="middle" fill="rgba(255,150,0,0.4)" font-size="10" font-family="monospace">自动恢复 · 告警路由</text>

  <!-- Arrow to Supervisor -->
  <line x1="682" y1="170" x2="728" y2="260" stroke="#9966ff" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="682" y1="300" x2="728" y2="290" stroke="#9966ff" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="682" y1="400" x2="728" y2="320" stroke="#9966ff" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Step 4: SupervisorAgent -->
  <rect x="730" y="200" width="140" height="160" rx="8" fill="rgba(153,102,255,0.07)" stroke="rgba(153,102,255,0.35)" stroke-width="1.5"/>
  <text x="800" y="226" text-anchor="middle" fill="#cc88ff" font-size="9" letter-spacing="2">SUPERVISOR</text>
  <text x="800" y="252" text-anchor="middle" fill="white" font-size="15" font-weight="700">统一入口</text>
  <line x1="744" y1="262" x2="856" y2="262" stroke="rgba(153,102,255,0.15)" stroke-width="1"/>
  <text x="800" y="284" text-anchor="middle" fill="rgba(153,102,255,0.6)" font-size="10">意图分类</text>
  <text x="800" y="302" text-anchor="middle" fill="rgba(153,102,255,0.6)" font-size="10">路由决策</text>
  <text x="800" y="320" text-anchor="middle" fill="rgba(153,102,255,0.6)" font-size="10">结果汇总</text>
  <text x="800" y="346" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9">agent-as-tools</text>

