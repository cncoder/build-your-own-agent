<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'PingFang SC',sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08090f"/>
      <stop offset="100%" stop-color="#0c0a16"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#9966ff" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="url(#bg2)" rx="12"/>
  <text x="450" y="38" text-anchor="middle" fill="#9966ff" font-size="10" letter-spacing="3">LENA-SPECKIT ARCHITECTURE · v1.9</text>
  <text x="450" y="64" text-anchor="middle" fill="white" font-size="22" font-weight="900">通用 Runtime → Fork → 薄层配置 → 专用 Agent</text>
  <line x1="60" y1="76" x2="840" y2="76" stroke="#9966ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Step 1: Universal Runtime -->
  <rect x="60" y="100" width="160" height="340" rx="8" fill="rgba(153,102,255,0.05)" stroke="rgba(153,102,255,0.3)" stroke-width="1.5"/>
  <text x="140" y="124" text-anchor="middle" fill="#9966ff" font-size="9" letter-spacing="2">RUNTIME</text>
  <text x="140" y="148" text-anchor="middle" fill="white" font-size="16" font-weight="700">通用 Lena</text>
  <line x1="74" y1="158" x2="206" y2="158" stroke="rgba(153,102,255,0.15)" stroke-width="1"/>
  <g fill="rgba(153,102,255,0.07)" stroke="rgba(153,102,255,0.2)" stroke-width="1">
    <rect x="74" y="168" width="132" height="28" rx="3"/>
    <rect x="74" y="202" width="132" height="28" rx="3"/>
    <rect x="74" y="236" width="132" height="28" rx="3"/>
    <rect x="74" y="270" width="132" height="28" rx="3"/>
    <rect x="74" y="304" width="132" height="28" rx="3"/>
    <rect x="74" y="338" width="132" height="28" rx="3"/>
    <rect x="74" y="372" width="132" height="28" rx="3"/>
    <rect x="74" y="406" width="132" height="28" rx="3"/>
  </g>
  <text x="140" y="187" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">LLM Provider</text>
  <text x="140" y="221" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Tool Registry ×30</text>
  <text x="140" y="255" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Memory (3 层)</text>
  <text x="140" y="289" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">AgentLoop</text>
  <text x="140" y="323" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Skills</text>
  <text x="140" y="357" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Channel</text>
