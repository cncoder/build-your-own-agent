  <text x="800" y="428" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14" font-weight="600">用户</text>
  <text x="800" y="448" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">一个入口</text>

  <line x1="800" y1="398" x2="800" y2="362" stroke="#9966ff" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5" marker-end="url(#arr)"/>

