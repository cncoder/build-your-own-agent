<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0d10; font-family: 'SF Mono','Fira Code','Courier New',monospace; }
.bg-grid { position: absolute; inset: 0;
  background-image: linear-gradient(rgba(100,180,255,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(100,180,255,0.04) 1px,transparent 1px);
  background-size: 60px 60px; }
.bg-glow { position: absolute; width: 900px; height: 900px; border-radius: 50%;
  background: radial-gradient(circle,rgba(100,180,255,0.07) 0%,transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%); }
.chapter-tag { position: absolute; top: 60px; left: 80px;
  font-size: 13px; letter-spacing: 0.3em; color: #64b4ff; text-transform: uppercase;
  border: 1px solid rgba(100,180,255,0.3); padding: 6px 16px; border-radius: 2px; }
.chapter-num { position: absolute; top: 40px; right: 80px;
  font-size: 180px; font-weight: 900; color: rgba(255,255,255,0.03);
  line-height: 1; letter-spacing: -0.05em; font-family: 'Arial Black',sans-serif; }
.main { position: absolute; top: 50%; left: 80px; transform: translateY(-50%); }
.title-line1 { font-size: 20px; letter-spacing: 0.25em; color: rgba(255,255,255,0.4); margin-bottom: 16px; text-transform: uppercase; }
.title-main { font-size: 96px; font-weight: 900; color: #ffffff; line-height: 1;
  letter-spacing: -0.02em; font-family: 'Arial Black','Helvetica Neue',sans-serif; }
.title-sub { font-size: 48px; font-weight: 300; color: #64b4ff; margin-top: 12px; letter-spacing: 0.05em; }
.subtitle { margin-top: 40px; font-size: 18px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }
.right-panel { position: absolute; right: 80px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 16px; align-items: flex-end; }
.badge { background: rgba(100,180,255,0.08); border: 1px solid rgba(100,180,255,0.2);
  border-radius: 8px; padding: 12px 24px; font-size: 15px; color: rgba(255,255,255,0.6);
  letter-spacing: 0.1em; }
.badge span { color: #64b4ff; }
</style></head>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="chapter-tag">Chapter 17 · Cross-Cutting Pillar</div>

<div class="main">

</div>
<div class="right-panel">
  <div class="badge">lena-v1.7 <span>→ CI eval</span></div>

</div>
</body></html>
