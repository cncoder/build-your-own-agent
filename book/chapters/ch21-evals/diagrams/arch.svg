<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070c10"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(100,180,255,0.5)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(0,255,136,0.6)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,68,68,0.6)"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="44" font-family="Arial Black,sans-serif" font-size="11" letter-spacing="3" fill="rgba(100,180,255,0.6)">LENA V1.7 · EVAL ARCHITECTURE</text>
  <text x="40" y="80" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="white">CI Eval 完整架构图</text>
  <line x1="40" y1="100" x2="1160" y2="100" stroke="rgba(100,180,255,0.12)" stroke-width="1"/>

  <!-- PR trigger -->
  <rect x="40" y="130" width="160" height="70" rx="10" fill="rgba(100,180,255,0.08)" stroke="rgba(100,180,255,0.25)" stroke-width="1.5"/>
  <text x="120" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#e0e8ff">PR 提交</text>
  <text x="120" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">代码变更</text>

  <!-- Arrow -->
  <line x1="200" y1="165" x2="250" y2="165" stroke="rgba(100,180,255,0.4)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CI Actions -->
  <rect x="250" y="120" width="200" height="90" rx="10" fill="rgba(100,180,255,0.06)" stroke="rgba(100,180,255,0.2)" stroke-width="1"/>
  <text x="350" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="rgba(100,180,255,0.9)">GitHub Actions</text>
  <text x="350" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">PR: 20条采样</text>
  <text x="350" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">main: 100条全量</text>

  <!-- Arrow down to runner -->
  <line x1="350" y1="210" x2="350" y2="260" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- run_eval.py -->
  <rect x="250" y="260" width="200" height="60" rx="10" fill="rgba(170,136,255,0.08)" stroke="rgba(170,136,255,0.25)" stroke-width="1.5"/>
  <text x="350" y="287" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#aa88ff">run_eval.py</text>
  <text x="350" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">CLI 入口</text>

  <!-- Arrows to sub-components -->
  <line x1="350" y1="320" x2="200" y2="400" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="320" x2="350" y2="400" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="320" x2="500" y2="400" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- golden_runner.py -->
  <rect x="100" y="400" width="190" height="60" rx="10" fill="rgba(0,255,136,0.07)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
  <text x="195" y="426" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#44ff88">golden_runner.py</text>
  <text x="195" y="444" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Golden dataset 运行</text>

  <!-- judge.py -->
  <rect x="250" y="400" width="190" height="60" rx="10" fill="rgba(255,153,68,0.07)" stroke="rgba(255,153,68,0.2)" stroke-width="1"/>
  <text x="345" y="426" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ff9944">judge.py</text>
  <text x="345" y="444" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">LLM-as-judge</text>

  <!-- regression.py -->
  <rect x="450" y="400" width="190" height="60" rx="10" fill="rgba(100,180,255,0.07)" stroke="rgba(100,180,255,0.2)" stroke-width="1"/>
  <text x="545" y="426" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#64b4ff">regression.py</text>
  <text x="545" y="444" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">版本回归对比</text>

  <!-- scorer.py -->
  <line x1="350" y1="460" x2="350" y2="510" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="250" y="510" width="200" height="60" rx="10" fill="rgba(255,200,50,0.07)" stroke="rgba(255,200,50,0.2)" stroke-width="1.5"/>
  <text x="350" y="537" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ffc832">scorer.py</text>
  <text x="350" y="555" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">三维度评分</text>

  <!-- Arrow to report -->
  <line x1="350" y1="570" x2="350" y2="610" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- eval-report.json -->
  <rect x="250" y="610" width="200" height="60" rx="10" fill="rgba(100,180,255,0.06)" stroke="rgba(100,180,255,0.15)" stroke-width="1"/>
  <text x="350" y="637" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#e0e8ff">eval-report.json</text>
  <text x="350" y="655" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">输出报告</text>

  <!-- Pass/Fail -->
  <line x1="350" y1="670" x2="280" y2="720" stroke="rgba(0,255,136,0.4)" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="350" y1="670" x2="420" y2="720" stroke="rgba(255,68,68,0.4)" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="180" y="720" width="180" height="50" rx="8" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="1.5"/>
  <text x="270" y="748" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#00ff88">PASS · 可合并</text>

  <rect x="370" y="720" width="180" height="50" rx="8" fill="rgba(255,68,68,0.08)" stroke="rgba(255,68,68,0.3)" stroke-width="1.5"/>
  <text x="460" y="748" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ff4466">FAIL · 阻断合并</text>

  <!-- Right side: Golden dataset + baseline -->
  <rect x="700" y="130" width="460" height="640" rx="16" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="720" y="162" font-family="Arial,sans-serif" font-size="11" letter-spacing="2" fill="rgba(100,180,255,0.5)" font-weight="700">输入 / 输出</text>

  <!-- golden-dataset.json -->
  <rect x="720" y="176" width="200" height="80" rx="10" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.15)" stroke-width="1"/>
  <text x="820" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#44ff88">golden-dataset.json</text>
  <text x="820" y="227" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">100 个测试用例</text>
  <text x="820" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">分层能力覆盖</text>

  <!-- Arrow from dataset to runner -->
  <line x1="820" y1="256" x2="500" y2="380" stroke="rgba(0,255,136,0.2)" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- baseline/latest.json -->
  <rect x="720" y="296" width="200" height="80" rx="10" fill="rgba(255,153,68,0.06)" stroke="rgba(255,153,68,0.15)" stroke-width="1"/>
  <text x="820" y="327" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ff9944">baseline/latest.json</text>
  <text x="820" y="347" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">历史版本评分</text>
  <text x="820" y="364" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">main 合并后更新</text>

  <line x1="720" y1="336" x2="640" y2="430" stroke="rgba(255,153,68,0.2)" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Haiku / Sonnet judge -->
  <rect x="960" y="176" width="180" height="80" rx="10" fill="rgba(255,153,68,0.06)" stroke="rgba(255,153,68,0.15)" stroke-width="1"/>
  <text x="1050" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ff9944">Claude Haiku</text>
  <text x="1050" y="227" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">fast judge</text>
  <text x="1050" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,153,68,0.6)">$0.0003/call</text>

  <rect x="960" y="276" width="180" height="60" rx="10" fill="rgba(100,180,255,0.06)" stroke="rgba(100,180,255,0.15)" stroke-width="1"/>
  <text x="1050" y="301" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#64b4ff">Claude Sonnet</text>
  <text x="1050" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">边界区复判</text>

  <line x1="960" y1="216" x2="440" y2="430" stroke="rgba(255,153,68,0.15)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- report.py / HTML report -->
  <rect x="720" y="550" width="200" height="60" rx="10" fill="rgba(170,136,255,0.06)" stroke="rgba(170,136,255,0.15)" stroke-width="1"/>
  <text x="820" y="577" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#aa88ff">report.py</text>
  <text x="820" y="595" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">HTML 可视化报告</text>

  <line x1="450" y1="640" x2="720" y2="580" stroke="rgba(170,136,255,0.2)" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- PR comment -->
  <rect x="960" y="550" width="180" height="60" rx="10" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.15)" stroke-width="1"/>
  <text x="1050" y="577" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#44ff88">PR 评论</text>
  <text x="1050" y="595" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">自动写入分数</text>

  <line x1="920" y1="577" x2="960" y2="577" stroke="rgba(0,255,136,0.2)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <line x1="40" y1="775" x2="1160" y2="775" stroke="rgba(100,180,255,0.08)" stroke-width="1"/>
  <text x="40" y="795" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">lena-v1.7 · PR 跑 20 条（~$0.006）  ·  main 跑 100 条（~$0.030）  ·  composite &lt; 0.75 阻断合并</text>
</svg>
