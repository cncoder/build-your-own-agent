  <rect x="60" y="330" width="260" height="130" rx="12" fill="rgba(34,211,238,0.05)" stroke="rgba(34,211,238,0.2)" stroke-width="1.5"/>
  <rect x="60" y="330" width="260" height="3" rx="1.5" fill="rgba(34,211,238,0.5)"/>
