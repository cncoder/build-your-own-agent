  <!-- mem files badge -->
  <rect x="512" y="390" width="112" height="50" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <text x="568" y="413" text-anchor="middle" font-size="11" fill="#4ade80">mem_*.md</text>
  <text x="568" y="430" text-anchor="middle" font-size="9" fill="#64748b">YAML frontmatter</text>

  <text x="500" y="468" text-anchor="middle" font-size="11" fill="#4ade80">✓ 跨 restart 永久有效</text>
  <text x="500" y="486" text-anchor="middle" font-size="11" fill="#4ade80">✓ 可检查 可编辑 零依赖</text>
  <text x="500" y="504" text-anchor="middle" font-size="10" fill="rgba(226,232,240,0.5)">~/.lena/projects/&lt;slug&gt;/memory/</text>
  <text x="500" y="520" text-anchor="middle" font-size="10" fill="rgba(226,232,240,0.5)">CC 路径: ~/.claude/projects/&lt;slug&gt;/memory/</text>

  <!-- Arrow agent -> long term (save_memory tool) -->
  <line x1="340" y1="248" x2="440" y2="330" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="400" y="294" font-size="9" fill="#4ade80" text-anchor="middle">save_memory</text>

  <!-- Arrow long term -> system prompt (auto load) -->
  <line x1="500" y1="330" x2="342" y2="164" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)" opacity="0.8"/>
  <text x="468" y="255" font-size="9" fill="#fb923c" text-anchor="middle">自动加载</text>
  <text x="468" y="268" font-size="9" fill="#fb923c" text-anchor="middle">format_for_prompt()</text>

  <!-- ===== System prompt detail ===== -->
  <rect x="680" y="220" width="180" height="200" rx="10" fill="rgba(0,0,0,0.35)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <text x="770" y="244" text-anchor="middle" font-size="12" fill="#4ade80" font-weight="700">system prompt</text>
  <rect x="695" y="256" width="150" height="22" rx="5" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.15)" stroke-width="0.5"/>
  <text x="770" y="271" text-anchor="middle" font-size="9" fill="#22d3ee">session_guidance</text>
  <rect x="695" y="284" width="150" height="28" rx="5" fill="rgba(168,85,247,0.2)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
  <text x="770" y="296" text-anchor="middle" font-size="9" fill="#a855f7" font-weight="700">memory (CLAUDE.md)</text>
  <text x="770" y="308" text-anchor="middle" font-size="8" fill="#a855f7">← 长期记忆在这里</text>
  <rect x="695" y="318" width="150" height="22" rx="5" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.15)" stroke-width="0.5"/>
  <text x="770" y="333" text-anchor="middle" font-size="9" fill="#22d3ee">env_info + tools</text>
  <rect x="695" y="346" width="150" height="28" rx="5" fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.25)" stroke-width="0.8"/>
  <text x="770" y="358" text-anchor="middle" font-size="9" fill="#fb923c" font-weight="700">Recitation</text>
  <text x="770" y="370" text-anchor="middle" font-size="8" fill="#fb923c">末尾重申 · 防漂移</text>
  <line x1="695" y1="384" x2="845" y2="384" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <text x="770" y="402" text-anchor="middle" font-size="9" fill="#64748b">prompts.ts:492 (CC 源码)</text>

  <!-- Arrow syst prompt ref -->
  <line x1="680" y1="315" x2="642" y2="200" stroke="rgba(74,222,128,0.4)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Manus quote bottom -->
  <rect x="60" y="500" width="240" height="44" rx="8" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.15)" stroke-width="1"/>
  <text x="180" y="519" text-anchor="middle" font-size="10" fill="#fbbf24">"文件系统是无限外部记忆"</text>
  <text x="180" y="534" text-anchor="middle" font-size="9" fill="#64748b">— Manus Context Engineering</text>
</svg>
