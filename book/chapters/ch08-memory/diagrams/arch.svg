<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee" opacity="0.9"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7" opacity="0.9"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80" opacity="0.9"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#070714" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">lena-v0.6 记忆架构图</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- User -->
  <rect x="60" y="80" width="120" height="50" rx="10" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.35)" stroke-width="1.5"/>
  <text x="120" y="110" text-anchor="middle" font-size="14" fill="#a855f7" font-weight="600">👤 用户输入</text>

  <!-- Arrow user -> agent -->
  <line x1="180" y1="105" x2="240" y2="105" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- Agent core -->
  <rect x="242" y="68" width="200" height="220" rx="12" fill="rgba(34,211,238,0.05)" stroke="rgba(34,211,238,0.25)" stroke-width="1.5"/>
  <text x="342" y="92" text-anchor="middle" font-size="13" fill="#22d3ee" font-weight="700">Agent Loop</text>

  <!-- messages[] box inside agent -->
  <rect x="262" y="102" width="160" height="50" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="342" y="125" text-anchor="middle" font-size="12" fill="#22d3ee">messages[]</text>
  <text x="342" y="142" text-anchor="middle" font-size="10" fill="#64748b">当前对话 (in-memory)</text>

  <!-- LLM box inside agent -->
  <rect x="262" y="164" width="160" height="50" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="342" y="187" text-anchor="middle" font-size="12" fill="#a855f7">LLM (claude-3-5)</text>
  <text x="342" y="203" text-anchor="middle" font-size="10" fill="#64748b">with system prompt</text>

  <!-- Tools box inside agent -->
  <rect x="262" y="226" width="160" height="50" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <text x="342" y="249" text-anchor="middle" font-size="12" fill="#4ade80">Tools</text>
  <text x="342" y="265" text-anchor="middle" font-size="10" fill="#64748b">save_memory, get_time...</text>

  <!-- Arrow agent -> response -->
  <line x1="180" y1="105" x2="242" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="442" y1="200" x2="500" y2="105" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Response -->
  <rect x="500" y="80" width="120" height="50" rx="10" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <text x="560" y="110" text-anchor="middle" font-size="14" fill="#4ade80" font-weight="600">💬 响应</text>
  <line x1="442" y1="105" x2="500" y2="105" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-g)"/>

