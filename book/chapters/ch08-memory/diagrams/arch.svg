  <text x="190" y="376" text-anchor="middle" font-size="11" fill="#64748b">memory/store.py</text>
  <text x="190" y="400" text-anchor="middle" font-size="11" fill="rgba(226,232,240,0.6)">sessions 表 + messages 表</text>
  <text x="190" y="418" text-anchor="middle" font-size="11" fill="rgba(226,232,240,0.6)">JSON content · 零依赖</text>
  <text x="190" y="440" text-anchor="middle" font-size="11" fill="#4ade80">✓ 重启可恢复同会话历史</text>
  <text x="190" y="456" text-anchor="middle" font-size="10" fill="#fb923c">⚠️ compaction → 摘要不可信</text>

  <!-- Arrow agent <-> short term -->
  <line x1="280" y1="288" x2="190" y2="330" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="218" y="314" font-size="9" fill="#64748b" text-anchor="middle">load / append</text>

  <!-- ===== LONG TERM ===== -->
  <rect x="360" y="330" width="280" height="200" rx="12" fill="rgba(168,85,247,0.05)" stroke="rgba(168,85,247,0.2)" stroke-width="1.5"/>
  <rect x="360" y="330" width="280" height="3" rx="1.5" fill="rgba(168,85,247,0.5)"/>
  <text x="500" y="356" text-anchor="middle" font-size="13" fill="#a855f7" font-weight="700">🗄️ 长期记忆 · 文件系统</text>
  <text x="500" y="376" text-anchor="middle" font-size="11" fill="#64748b">memory/memdir.py</text>

  <!-- MEMORY.md badge -->
  <rect x="375" y="390" width="100" height="50" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="425" y="413" text-anchor="middle" font-size="11" fill="#a855f7">MEMORY.md</text>
  <text x="425" y="430" text-anchor="middle" font-size="9" fill="#64748b">索引 · 快速扫描</text>

