<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520"
     font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070714"/>
      <stop offset="100%" style="stop-color:#0d0d24"/>
    </linearGradient>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="ac" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">lena-v0.3 架构图</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">AgentLoop · 6 模块 · tool_use/tool_result 协议</text>

  <!-- User box -->
  <rect x="40" y="85" width="120" height="50" rx="10" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.4)" stroke-width="1.5"/>
  <text x="100" y="106" text-anchor="middle" font-size="13" fill="#a855f7" font-weight="700">👤 用户</text>
  <text x="100" y="125" text-anchor="middle" font-size="11" fill="#64748b">REPL 输入</text>

  <!-- Memory box -->
  <rect x="40" y="205" width="160" height="60" rx="10" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1.5"/>
  <text x="120" y="230" text-anchor="middle" font-size="14" fill="#4ade80" font-weight="700">💾 Memory</text>
  <text x="120" y="249" text-anchor="middle" font-size="12" fill="#64748b">messages[]</text>

  <!-- AgentLoop center -->
  <rect x="300" y="160" width="300" height="180" rx="16" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.2)" stroke-width="1.5"/>
  <text x="450" y="195" text-anchor="middle" font-size="16" font-weight="700" fill="#a855f7">🔁 AgentLoop</text>
  <text x="450" y="215" text-anchor="middle" font-size="12" fill="rgba(241,245,249,0.6)">agent_loop() — while 循环</text>
  <rect x="320" y="228" width="260" height="96" rx="8" fill="rgba(0,0,0,0.2)"/>
  <text x="450" y="250" text-anchor="middle" font-size="12" fill="#e2e8f0" font-family="Fira Code,monospace">for turn in range(max_turns):</text>
  <text x="450" y="270" text-anchor="middle" font-size="12" fill="#22d3ee" font-family="Fira Code,monospace">  response = provider.chat()</text>
  <text x="450" y="290" text-anchor="middle" font-size="12" fill="#fb923c" font-family="Fira Code,monospace">  if tool_calls: execute_tool()</text>
  <text x="450" y="310" text-anchor="middle" font-size="12" fill="#4ade80" font-family="Fira Code,monospace">  else: return response.content</text>

  <!-- Provider box -->
  <rect x="660" y="85" width="200" height="130" rx="12" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.3)" stroke-width="1.5"/>
  <text x="760" y="110" text-anchor="middle" font-size="14" fill="#22d3ee" font-weight="700">🔌 Provider</text>
  <rect x="676" y="122" width="168" height="20" rx="5" fill="rgba(168,85,247,0.1)"/>
  <text x="760" y="136" text-anchor="middle" font-size="12" fill="#a855f7">AnthropicProvider</text>
  <rect x="676" y="147" width="168" height="20" rx="5" fill="rgba(34,211,238,0.1)"/>
  <text x="760" y="161" text-anchor="middle" font-size="12" fill="#22d3ee">OpenAIProvider</text>
  <rect x="676" y="172" width="168" height="20" rx="5" fill="rgba(74,222,128,0.1)"/>
  <text x="760" y="186" text-anchor="middle" font-size="12" fill="#4ade80">BedrockProvider</text>
  <text x="760" y="206" text-anchor="middle" font-size="11" fill="#64748b">tool_use 格式差异屏蔽</text>

  <!-- ToolRegistry box -->
  <rect x="660" y="245" width="200" height="100" rx="12" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.25)" stroke-width="1.5"/>
  <text x="760" y="270" text-anchor="middle" font-size="14" fill="#fb923c" font-weight="700">🔧 ToolRegistry</text>
  <rect x="676" y="282" width="168" height="22" rx="5" fill="rgba(74,222,128,0.1)"/>
  <text x="760" y="297" text-anchor="middle" font-size="12" fill="#4ade80">⚡ get_time()</text>
  <text x="760" y="335" text-anchor="middle" font-size="11" fill="#64748b">schema + handler</text>

  <!-- Config box -->
  <rect x="40" y="355" width="160" height="60" rx="10" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.2)" stroke-width="1.5"/>
  <text x="120" y="380" text-anchor="middle" font-size="14" fill="#fb923c" font-weight="700">⚙️ Config</text>
  <text x="120" y="399" text-anchor="middle" font-size="11" fill="#64748b">--provider / .env / max-turns</text>

  <!-- Arrows -->
  <!-- User → AgentLoop -->
  <line x1="160" y1="110" x2="298" y2="210" stroke="#a855f7" stroke-width="2" marker-end="url(#ap)"/>
  <text x="200" y="153" font-size="11" fill="#a855f7" transform="rotate(-35,200,153)">用户输入</text>

  <!-- AgentLoop ↔ Memory -->
  <line x1="300" y1="230" x2="205" y2="235" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="200" y1="245" x2="298" y2="250" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="225" y="228" font-size="10" fill="#4ade80">读/写</text>

  <!-- AgentLoop ↔ Provider -->
  <line x1="600" y1="195" x2="660" y2="160" stroke="#22d3ee" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="660" y1="180" x2="600" y2="220" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="618" y="183" font-size="11" fill="#22d3ee">chat()</text>

  <!-- AgentLoop ↔ ToolRegistry -->
  <line x1="600" y1="275" x2="658" y2="285" stroke="#fb923c" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="658" y1="300" x2="600" y2="295" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="612" y="272" font-size="11" fill="#fb923c">execute</text>
  <text x="612" y="312" font-size="11" fill="#4ade80">result</text>

  <!-- AgentLoop → User (final reply) -->
  <line x1="300" y1="175" x2="165" y2="120" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <text x="186" y="141" font-size="11" fill="rgba(168,85,247,0.7)">最终回复</text>

  <!-- Config → AgentLoop -->
  <line x1="200" y1="383" x2="350" y2="342" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ag)"/>
  <text x="225" y="376" font-size="10" fill="rgba(251,146,60,0.7)">provider 配置</text>

  <!-- Legend -->
  <rect x="40" y="455" width="820" height="52" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="60" y="478" font-size="12" fill="#64748b">引用来源：</text>
  <text x="140" y="478" font-size="12" fill="rgba(241,245,249,0.6)">nano-claw loop.ts:91</text>
  <text x="300" y="478" font-size="12" fill="rgba(241,245,249,0.6)">nanoClaw core/agent.py:155</text>
  <text x="490" y="478" font-size="12" fill="rgba(241,245,249,0.6)">R2 MVA 6 模块共识</text>
  <text x="620" y="478" font-size="12" fill="rgba(241,245,249,0.6)">Bedrock 实测 2026-05-06</text>
  <text x="60" y="497" font-size="11" fill="#64748b">六大支柱标签：</text>
  <rect x="145" y="485" width="120" height="18" rx="4" fill="rgba(168,85,247,0.15)"/>
  <text x="205" y="498" text-anchor="middle" font-size="11" fill="#a855f7" font-weight="600">⚡ Tool 统一性</text>
</svg>
