  <rect x="840" y="625" width="700" height="44" rx="6" fill="rgba(251,146,60,0.04)"/>
  <text x="855" y="644" font-size="12" fill="rgba(251,146,60,0.6)" font-weight="600">STEP 9</text>
  <line x1="1240" y1="647" x2="1085" y2="647" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
