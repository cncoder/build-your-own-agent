  <text x="1164" y="389" text-anchor="middle" font-size="11" fill="#fb923c">stop_reason="tool_use"</text>
  <text x="1157" y="408" text-anchor="middle" font-size="11" fill="rgba(251,146,60,0.8)">content=[{type:"tool_use", name:"get_time", id:"toolu_xxx"}]</text>

