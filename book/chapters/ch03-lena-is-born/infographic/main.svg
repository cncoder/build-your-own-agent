  <rect x="840" y="547" width="700" height="24" rx="6" fill="rgba(168,85,247,0.04)"/>
  <text x="855" y="564" font-size="12" fill="rgba(168,85,247,0.6)" font-weight="600">STEP 7</text>
  <rect x="1080" y="549" width="228" height="20" rx="4" fill="rgba(74,222,128,0.08)"/>
  <text x="1194" y="563" text-anchor="middle" font-size="11" fill="#4ade80" font-style="italic">messages.append(user/tool_result)</text>

  <!-- Step 8: AgentLoop → LLM (2nd call) -->
  <rect x="840" y="584" width="700" height="28" rx="6" fill="rgba(34,211,238,0.04)"/>
  <text x="855" y="603" font-size="12" fill="rgba(34,211,238,0.6)" font-weight="600">STEP 8</text>
  <line x1="1075" y1="598" x2="1240" y2="598" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="1157" y="592" text-anchor="middle" font-size="12" fill="#22d3ee">chat(messages) ← 第二次调用</text>

