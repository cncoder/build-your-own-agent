  <text x="1247" y="473" text-anchor="middle" font-size="12" fill="#4ade80">execute_tool("get_time", {})</text>

  <!-- Step 6: get_time → AgentLoop -->
  <rect x="840" y="506" width="700" height="28" rx="6" fill="rgba(74,222,128,0.04)"/>
  <text x="855" y="525" font-size="12" fill="rgba(74,222,128,0.6)" font-weight="600">STEP 6</text>
  <line x1="1420" y1="520" x2="1085" y2="520" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="1247" y="514" text-anchor="middle" font-size="12" fill="#4ade80">"当前时间是 2026年05月06日 00:24"</text>

