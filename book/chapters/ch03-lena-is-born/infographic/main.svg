  <text x="1160" y="643" text-anchor="middle" font-size="11" fill="#fb923c">stop_reason="end_turn"</text>
  <text x="1157" y="662" text-anchor="middle" font-size="11" fill="rgba(251,146,60,0.8)">content=[{type:"text", text:"现在是 00:24…"}]</text>

  <!-- Step 10: AgentLoop → User (final) -->
  <rect x="840" y="682" width="700" height="28" rx="6" fill="rgba(168,85,247,0.06)"/>
  <text x="855" y="701" font-size="12" fill="rgba(168,85,247,0.6)" font-weight="600">STEP 10</text>
  <line x1="1065" y1="696" x2="920" y2="696" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="925" y="681" width="130" height="22" rx="4" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="990" y="696" text-anchor="middle" font-size="12" fill="#a855f7" font-weight="600">"现在是 00:24…" ✓</text>

  <!-- KEY ANNOTATIONS -->
  <!-- Anthropic vs OpenAI note -->
  <rect x="840" y="726" width="700" height="56" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="860" y="745" font-size="13" fill="#22d3ee" font-weight="700">⚠ Anthropic vs OpenAI 格式差异（STEP 7）</text>
  <text x="860" y="765" font-size="13" fill="rgba(241,245,249,0.7)">Anthropic: role="user" + type="tool_result" + tool_use_id    OpenAI: role="tool" + tool_call_id</text>

