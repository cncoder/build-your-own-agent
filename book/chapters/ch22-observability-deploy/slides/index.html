  ];

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #040812; overflow: hidden; font-family: -apple-system, "PingFang SC", sans-serif; }
  #stage {
    position: fixed; top: 50%; left: 50%;
    transform-origin: top left; will-change: transform;
    box-shadow: 0 10px 60px rgba(0,0,0,0.7);
  }
  iframe { width: 100%; height: 100%; border: 0; display: block; background: #040812; }
  .counter {
    position: fixed; bottom: 20px; right: 20px;
    background: rgba(0,0,0,0.75); color: #fff; padding: 6px 14px;
    border-radius: 999px; font-size: 13px; letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums; z-index: 100; user-select: none;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .counter:hover { opacity: 1; }
  .counter .label { color: rgba(255,255,255,0.5); margin-left: 8px; font-size: 11px; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
  .nav-zone { position: fixed; top: 0; bottom: 0; width: 12%; cursor: pointer; z-index: 50; }
  .nav-zone.left { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 999px;
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; opacity: 0; transition: opacity 0.2s;
  }
  .nav-zone.left .nav-hint { left: 20px; }
  .nav-zone.right .nav-hint { right: 20px; }
  .nav-zone:hover .nav-hint { opacity: 1; }
</style>
</head>
<body>

<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>

<div class="nav-zone left"  id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div class="counter" id="counter">1 / 12</div>

<script>
(function () {
  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const storageKey = 'deck-ch18-' + location.pathname;
  let current = 0;

  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    const sx = window.innerWidth  / W;
    const sy = window.innerHeight / H;
    const s  = Math.min(sx, sy);
    const dx = (window.innerWidth  - W * s) / 2;
    const dy = (window.innerHeight - H * s) / 2;
    stage.style.transform = `translate(${dx}px, ${dy}px) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);

  function goTo(i) {
    if (!deck.length) return;
    i = Math.max(0, Math.min(deck.length - 1, i));
    current = i;
    frame.src = deck[i].file;
    counter.innerHTML = `${i + 1} / ${deck.length}<span class="label">${deck[i].label}</span>`;
    try { localStorage.setItem(storageKey, i); } catch(e) {}
  }

  try {
    const saved = parseInt(localStorage.getItem(storageKey), 10);
    if (!isNaN(saved) && saved >= 0 && saved < deck.length) current = saved;
  } catch(e) {}

  goTo(current);

  document.getElementById('navL').addEventListener('click', () => goTo(current - 1));
  document.getElementById('navR').addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp'   || e.key === 'PageUp')   goTo(current - 1);
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') goTo(current + 1);
    if (e.key === 'Home') goTo(0);
    if (e.key === 'End')  goTo(deck.length - 1);
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= 9) goTo(n - 1);
  });
})();
</script>
</body>
</html>
