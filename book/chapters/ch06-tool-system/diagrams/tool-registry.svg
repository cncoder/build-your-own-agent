<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="660" viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,'PingFang SC','Microsoft YaHei','JetBrains Mono',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="registryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.06"/>
    </linearGradient>
    <marker id="arrBlue" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#38bdf8" opacity="0.9"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#4ade80" opacity="0.9"/>
    </marker>
    <marker id="arrPurple" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#a78bfa" opacity="0.9"/>
    </marker>
    <marker id="arrOrange" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#fb923c" opacity="0.9"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="660" fill="url(#bg)" rx="4"/>
  <!-- Ambient -->
  <ellipse cx="550" cy="330" rx="480" ry="280" fill="#38bdf8" opacity="0.03"/>
  <ellipse cx="850" cy="420" rx="200" ry="160" fill="#a78bfa" opacity="0.04"/>

  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1100" height="660" fill="url(#grid)"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" font-size="22" font-weight="700"
        fill="#f1f5f9" filter="url(#softGlow)">Ch 06 · Tool Registry：加工具不改核心</text>
  <text x="550" y="70" text-anchor="middle" font-size="13" fill="#64748b">
    AgentLoop → ToolRegistry.execute(name, args) → ToolMeta(handler + schema + flags)
  </text>
  <!-- Glow line under title -->
  <line x1="200" y1="82" x2="900" y2="82" stroke="#38bdf8" stroke-width="0.8" opacity="0.3"/>

  <!-- ====== AgentLoop Box (left) ====== -->
  <rect x="40" y="110" width="220" height="440" rx="14"
        fill="url(#loopGrad)" stroke="#4ade80" stroke-width="1.4"/>
  <text x="150" y="138" text-anchor="middle" font-size="15" font-weight="700"
        fill="#4ade80" filter="url(#softGlow)">AgentLoop</text>
  <line x1="60" y1="148" x2="240" y2="148" stroke="#4ade80" stroke-width="0.6" opacity="0.4"/>

  <!-- Loop steps -->
  <rect x="60" y="162" width="180" height="38" rx="8"
        fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="150" y="186" text-anchor="middle" font-size="12" fill="#e2e8f0">① LLM 调用</text>

  <rect x="60" y="216" width="180" height="38" rx="8"
        fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="150" y="240" text-anchor="middle" font-size="12" fill="#e2e8f0">② 解析 tool_use 块</text>

  <!-- Highlighted: registry call -->
  <rect x="60" y="270" width="180" height="48" rx="8"
        fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="150" y="292" text-anchor="middle" font-size="12" fill="#38bdf8" font-weight="600">③ registry.execute(</text>
  <text x="150" y="310" text-anchor="middle" font-size="12" fill="#38bdf8" font-weight="600">    name, args)</text>

  <rect x="60" y="334" width="180" height="38" rx="8"
        fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="150" y="358" text-anchor="middle" font-size="12" fill="#e2e8f0">④ 回填 tool_result</text>

  <rect x="60" y="388" width="180" height="38" rx="8"
        fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="150" y="412" text-anchor="middle" font-size="12" fill="#e2e8f0">⑤ 循环 / 终止</text>

  <!-- Key insight -->
  <rect x="60" y="442" width="180" height="88" rx="8"
        fill="rgba(74,222,128,0.05)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <text x="150" y="463" text-anchor="middle" font-size="11" fill="#64748b">核心约束：</text>
  <text x="150" y="481" text-anchor="middle" font-size="11" fill="#94a3b8">loop 只认 name + args</text>
  <text x="150" y="499" text-anchor="middle" font-size="11" fill="#94a3b8">不 import 任何工具</text>
  <text x="150" y="517" text-anchor="middle" font-size="11" fill="#4ade80">→ 加工具不改核心</text>

  <!-- Arrow: AgentLoop → ToolRegistry -->
  <line x1="260" y1="294" x2="340" y2="294" stroke="#38bdf8" stroke-width="2"
        stroke-dasharray="none" marker-end="url(#arrBlue)"/>
  <text x="300" y="286" text-anchor="middle" font-size="11" fill="#38bdf8">execute()</text>

  <!-- ====== ToolRegistry Box (center) ====== -->
  <rect x="340" y="110" width="280" height="440" rx="14"
        fill="url(#registryGrad)" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="480" y="138" text-anchor="middle" font-size="15" font-weight="700"
        fill="#38bdf8" filter="url(#softGlow)">ToolRegistry</text>
  <line x1="360" y1="148" x2="600" y2="148" stroke="#38bdf8" stroke-width="0.6" opacity="0.4"/>

  <!-- schemas() method -->
  <rect x="360" y="162" width="240" height="52" rx="8"
        fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="480" y="184" text-anchor="middle" font-size="12" fill="#94a3b8">schemas()</text>
  <text x="480" y="202" text-anchor="middle" font-size="11" fill="#64748b">→ JSON Schema 列表给 LLM</text>

  <!-- execute() method -->
  <rect x="360" y="228" width="240" height="100" rx="8"
        fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="480" y="252" text-anchor="middle" font-size="13" fill="#38bdf8" font-weight="700">execute(name, args)</text>
  <text x="480" y="272" text-anchor="middle" font-size="11" fill="#94a3b8">① 查找 ToolMeta</text>
  <text x="480" y="290" text-anchor="middle" font-size="11" fill="#94a3b8">② 验证 Pydantic 模型</text>
  <text x="480" y="308" text-anchor="middle" font-size="11" fill="#94a3b8">③ 截断超长结果</text>

  <!-- register() method -->
  <rect x="360" y="342" width="240" height="52" rx="8"
        fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="480" y="364" text-anchor="middle" font-size="12" fill="#94a3b8">register(tool_meta)</text>
  <text x="480" y="382" text-anchor="middle" font-size="11" fill="#64748b">→ self._tools[name] = meta</text>

  <!-- Flags section -->
  <rect x="360" y="408" width="240" height="122" rx="8"
        fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <text x="480" y="428" text-anchor="middle" font-size="12" fill="#fb923c" font-weight="600">ToolMeta 三标志</text>
  <line x1="380" y1="436" x2="580" y2="436" stroke="#fb923c" stroke-width="0.5" opacity="0.4"/>
  <text x="390" y="455" font-size="11" fill="#94a3b8">is_read_only</text>
  <text x="580" y="455" text-anchor="end" font-size="11" fill="#64748b">只读，可并发</text>
  <text x="390" y="476" font-size="11" fill="#94a3b8">is_destructive</text>
  <text x="580" y="476" text-anchor="end" font-size="11" fill="#fb923c">破坏性，需审批</text>
  <text x="390" y="497" font-size="11" fill="#94a3b8">is_concurrency_safe</text>
  <text x="580" y="497" text-anchor="end" font-size="11" fill="#4ade80">可并发执行</text>
  <text x="390" y="518" font-size="11" fill="#64748b">max_result_chars</text>
  <text x="580" y="518" text-anchor="end" font-size="11" fill="#64748b">防 context 爆炸</text>

  <!-- Arrow: ToolRegistry → Tools -->
  <line x1="620" y1="294" x2="700" y2="294" stroke="#a78bfa" stroke-width="2"
        marker-end="url(#arrPurple)"/>
  <text x="660" y="286" text-anchor="middle" font-size="11" fill="#a78bfa">handler()</text>

  <!-- Arrow back: result -->
  <line x1="700" y1="310" x2="620" y2="310" stroke="#4ade80" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="660" y="326" text-anchor="middle" font-size="11" fill="#4ade80">result str</text>

  <!-- Arrow: result back to AgentLoop -->
  <line x1="340" y1="310" x2="260" y2="310" stroke="#4ade80" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>

  <!-- ====== Tools Column (right) ====== -->
  <!-- read_file -->
  <rect x="700" y="110" width="360" height="84" rx="12"
        fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="720" y="137" font-size="13" fill="#38bdf8" font-weight="600">read_file</text>
  <text x="720" y="156" font-size="11" fill="#64748b">is_read_only=True  is_concurrency_safe=True</text>
  <text x="720" y="174" font-size="11" fill="#64748b">max_result_chars=8000  (Infinity 会导致 context 爆炸)</text>

  <!-- write_file -->
  <rect x="700" y="208" width="360" height="84" rx="12"
        fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="720" y="235" font-size="13" fill="#fb923c" font-weight="600">write_file</text>
  <text x="720" y="254" font-size="11" fill="#64748b">is_destructive=True  is_concurrency_safe=False</text>
  <text x="720" y="272" font-size="11" fill="#64748b">串行执行，防止并发写冲突</text>

  <!-- shell -->
  <rect x="700" y="306" width="360" height="84" rx="12"
        fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="720" y="333" font-size="13" fill="#fb923c" font-weight="600">shell</text>
  <text x="720" y="352" font-size="11" fill="#64748b">is_destructive=True  is_concurrency_safe=False</text>
  <text x="720" y="370" font-size="11" fill="#64748b">两个并发 shell 可能互相干扰</text>

  <!-- web_search -->
  <rect x="700" y="404" width="360" height="84" rx="12"
        fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1.2"/>
  <text x="720" y="431" font-size="13" fill="#4ade80" font-weight="600">web_search</text>
  <text x="720" y="450" font-size="11" fill="#64748b">is_read_only=True  is_concurrency_safe=True</text>
  <text x="720" y="468" font-size="11" fill="#64748b">多个 search 可同时并发，互不干扰</text>

  <!-- Add tool arrow (bottom) -->
  <rect x="700" y="506" width="360" height="44" rx="12"
        fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="880" y="524" text-anchor="middle" font-size="12" fill="#a78bfa">+ 第 5 个工具</text>
  <text x="880" y="542" text-anchor="middle" font-size="11" fill="#64748b">lena.py 无需修改</text>

  <!-- Vertical connector lines for tools -->
  <line x1="700" y1="152" x2="700" y2="152" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>

  <!-- Footer note -->
  <rect x="40" y="570" width="1020" height="60" rx="8"
        fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="560" y="596" text-anchor="middle" font-size="12" fill="#64748b">
    关键设计：ToolRegistry 是 AgentLoop 和工具实现之间的唯一接口。
  </text>
  <text x="560" y="618" text-anchor="middle" font-size="12" fill="#94a3b8">
    新增工具只需实现 ToolMeta + handler，无需修改 loop 逻辑。每个工具 ≈ 1 个文件。
  </text>
</svg>
