  <text x="450" y="943" font-size="16" font-weight="700" fill="#f0ece4" text-anchor="middle" letter-spacing="1">EXECUTE · 受限环境运行</text>
  <text x="450" y="961" font-size="12" fill="#9a9a9a" text-anchor="middle" font-family="Courier New, monospace">PATH 白名单 · HOME→workspace · 超时 30s</text>

  <!-- Execute label -->
  <text x="692" y="947" font-size="12" fill="#5a5a5a" font-family="Courier New, monospace">→ 受控执行</text>

  <!-- Arrow down -->
  <line x1="450" y1="972" x2="450" y2="993" stroke="#5a5a5a" stroke-width="2" marker-end="url(#black-arrow)"/>

  <!-- Result -->
  <rect x="340" y="994" width="220" height="44" fill="#5a5a5a"/>
  <text x="450" y="1020" font-size="14" fill="#f8f8f8" text-anchor="middle">返回结果</text>

  <!-- Divider -->
  <line x1="60" y1="1060" x2="840" y2="1060" stroke="#c8c8c8" stroke-width="1"/>

