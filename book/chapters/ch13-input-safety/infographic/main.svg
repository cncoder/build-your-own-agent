  <text x="200" y="1118" font-size="11" fill="#cc2200" text-anchor="middle" font-family="Courier New, monospace">2023</text>
  <text x="200" y="1152" font-size="12" fill="#1a1a1a" text-anchor="middle">首批注入</text>
  <text x="200" y="1166" font-size="11" fill="#5a5a5a" text-anchor="middle">案例记录开始</text>

  <!-- Event 2 -->
  <circle cx="420" cy="1130" r="8" fill="#cc2200"/>
  <text x="420" y="1118" font-size="11" fill="#cc2200" text-anchor="middle" font-family="Courier New, monospace">2024</text>
  <text x="420" y="1152" font-size="12" fill="#1a1a1a" text-anchor="middle">3000 封邮件</text>
  <text x="420" y="1166" font-size="11" fill="#5a5a5a" text-anchor="middle">自动删除事故</text>

  <!-- Event 3 -->
  <circle cx="620" cy="1130" r="8" fill="#cc2200"/>
  <text x="620" y="1118" font-size="11" fill="#cc2200" text-anchor="middle" font-family="Courier New, monospace">2024</text>
  <text x="620" y="1152" font-size="12" fill="#1a1a1a" text-anchor="middle">攻击性文章</text>
  <text x="620" y="1166" font-size="11" fill="#5a5a5a" text-anchor="middle">自动发布事故</text>

  <!-- Event 4: now -->
  <circle cx="820" cy="1130" r="8" fill="#1a1a1a"/>
  <text x="820" y="1118" font-size="11" fill="#1a1a1a" text-anchor="middle" font-family="Courier New, monospace">2026</text>
  <text x="820" y="1152" font-size="12" fill="#1a1a1a" text-anchor="middle">lena-v1.0</text>
  <text x="820" y="1166" font-size="11" fill="#5a5a5a" text-anchor="middle">防御基线建立</text>

