  <!-- Layer 2 mid: ShellSandbox (black) -->
  <ellipse cx="450" cy="410" rx="255" ry="142" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-dasharray="12,6"/>
  <text x="450" y="293" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle" letter-spacing="2" font-family="Courier New, monospace">LAYER 2 · SHELLSANDBOX</text>
  <text x="450" y="312" font-size="12" fill="#5a5a5a" text-anchor="middle" font-family="Courier New, monospace">BLOCKED(30) · CONFIRM(15) · EXECUTE</text>

