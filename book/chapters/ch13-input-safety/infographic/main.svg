<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="1200" fill="#f0ece4"/>

  <!-- Grid lines (subtle Bauhaus) -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#c8c8c8" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="900" height="1200" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="12" height="1200" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="12" y="0" width="888" height="160" fill="#0a0a0a"/>
  <text x="60" y="56" font-size="13" fill="#9a9a9a" letter-spacing="4" font-family="Courier New, monospace">CH 10 · SAFETY · AGENT 安全纵深防御图</text>
  <text x="60" y="110" font-size="52" font-weight="900" fill="#f8f8f8" letter-spacing="-2">DEFENSE IN DEPTH</text>
  <rect x="60" y="130" width="80" height="5" fill="#cc2200"/>

  <!-- LAYER LABELS (right side) -->
  <text x="780" y="108" font-size="14" fill="#5a5a5a" font-family="Courier New, monospace" text-anchor="end">lena-v1.0</text>

  <!-- ══════════════════════════════════════════
       SECTION 1: THREE-LAYER CONCENTRIC
  ═══════════════════════════════════════════ -->
  <text x="60" y="218" font-size="13" fill="#5a5a5a" letter-spacing="3" font-family="Courier New, monospace">三层防御同心圆</text>

  <!-- Layer 1 outer: PromptGuard (red dashed) -->
  <ellipse cx="450" cy="410" rx="360" ry="200" fill="none" stroke="#cc2200" stroke-width="3" stroke-dasharray="12,6"/>
  <text x="450" y="233" font-size="16" font-weight="700" fill="#cc2200" text-anchor="middle" letter-spacing="2" font-family="Courier New, monospace">LAYER 1 · PROMPTGUARD</text>
