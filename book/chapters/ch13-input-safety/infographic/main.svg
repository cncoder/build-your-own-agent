  <ellipse cx="450" cy="410" rx="150" ry="84" fill="#0a0a0a"/>
  <text x="450" y="400" font-size="14" font-weight="700" fill="#f8f8f8" text-anchor="middle" font-family="Courier New, monospace">PERMISSION</text>
  <text x="450" y="420" font-size="14" font-weight="700" fill="#f8f8f8" text-anchor="middle" font-family="Courier New, monospace">MODES</text>
  <text x="450" y="440" font-size="11" fill="#9a9a9a" text-anchor="middle" font-family="Courier New, monospace">+ HITL</text>

