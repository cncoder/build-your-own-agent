  <text x="793" y="1816" text-anchor="middle" fill="#94a3b8" font-size="15" letter-spacing="3">SECTION 5 · 铁律（血泪教训）</text>
  <line x1="200" y1="1824" x2="580" y2="1824" stroke="rgba(148,163,184,0.3)" stroke-width="1"/>
  <line x1="1007" y1="1824" x2="1387" y2="1824" stroke="rgba(148,163,184,0.3)" stroke-width="1"/>

  <rect x="60" y="1840" width="1467" height="300" rx="16" fill="rgba(248,113,113,0.04)" stroke="rgba(248,113,113,0.2)" stroke-width="1.5"/>
  <text x="90" y="1875" fill="#f87171" font-size="16" font-weight="700">案例 8.1：EI 报告 Sub-agent 6 小时白等</text>
  <text x="90" y="1898" fill="#94a3b8" font-size="13">根因：数据只在 session 内存 → compaction 后数据消失 → sub-agent 说「马上出」但 6 小时没产出</text>

  <!-- Three steps -->
  <rect x="90" y="1912" width="430" height="200" rx="12" fill="rgba(30,30,58,0.7)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
  <text x="120" y="1938" fill="#f87171" font-size="14" font-weight="700">❌ 错误模式</text>
  <text x="120" y="1962" fill="#94a3b8" font-size="13">data = fetch_data()</text>
  <text x="120" y="1982" fill="#94a3b8" font-size="13">print("马上生成 PDF...")</text>
  <text x="120" y="2002" fill="#6b7280" font-size="11">→ compaction 后 data 消失</text>
  <text x="120" y="2022" fill="#6b7280" font-size="11">→ 说"马上出"但永远出不来</text>

  <rect x="560" y="1912" width="930" height="200" rx="12" fill="rgba(52,211,153,0.05)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
  <text x="590" y="1938" fill="#34d399" font-size="14" font-weight="700">✓ 铁律三步串行（必须落盘）</text>
  <!-- Step 1 -->
  <rect x="590" y="1952" width="8" height="8" rx="2" fill="#a78bfa"/>
  <text x="606" y="1961" fill="#94a3b8" font-size="12">步骤 1：数据 → 文件</text>
  <text x="606" y="1977" fill="#6ee7b7" font-size="12">data_file.write_text(json.dumps(data)) · assert data_file.exists()</text>
  <!-- Step 2 -->
  <rect x="590" y="1994" width="8" height="8" rx="2" fill="#34d399"/>
  <text x="606" y="2003" fill="#94a3b8" font-size="12">步骤 2：文件 → PDF</text>
  <text x="606" y="2019" fill="#6ee7b7" font-size="12">pdf_file = generate_pdf(data_file) · assert pdf_file.exists()</text>
  <!-- Step 3 -->
  <rect x="590" y="2036" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="606" y="2045" fill="#94a3b8" font-size="12">步骤 3：PDF → Discord</text>
  <text x="606" y="2061" fill="#6ee7b7" font-size="12">send_to_discord(pdf_file)  # PDF 在了才发</text>

