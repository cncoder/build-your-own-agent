<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="680" viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="orchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.05"/>
    </linearGradient>
    <marker id="arrYellow" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f59e0b" opacity="0.9"/>
    </marker>
    <marker id="arrBlue" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#38bdf8" opacity="0.9"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#4ade80" opacity="0.9"/>
    </marker>
    <marker id="arrPink" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f472b6" opacity="0.9"/>
    </marker>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1100" height="680" fill="url(#bg)" rx="4"/>
  <rect width="1100" height="680" fill="url(#grid)"/>
  <!-- Ambient glows -->
  <ellipse cx="550" cy="340" rx="500" ry="300" fill="#f59e0b" opacity="0.02"/>
  <ellipse cx="800" cy="400" rx="300" ry="200" fill="#38bdf8" opacity="0.03"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" font-size="22" font-weight="700"
        fill="#f1f5f9" filter="url(#softGlow)">Ch 11 · Planning &amp; Subagent：Orchestrator-Worker 拓扑</text>
  <text x="550" y="70" text-anchor="middle" font-size="13" fill="#64748b">
    串行 11.1s → 并发 4.1s（节省 63%）| agentId 隔离防止 todo 列表互相覆盖
  </text>
  <line x1="180" y1="82" x2="920" y2="82" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>

  <!-- ====== User Box ====== -->
  <rect x="30" y="280" width="140" height="80" rx="12"
        fill="url(#userGrad)" stroke="#4ade80" stroke-width="1.4"/>
  <text x="100" y="316" text-anchor="middle" font-size="14" fill="#4ade80" font-weight="700">用户</text>
  <text x="100" y="338" text-anchor="middle" font-size="11" fill="#94a3b8">"调研 X, Y, Z"</text>
  <text x="100" y="354" text-anchor="middle" font-size="11" fill="#64748b">一条指令</text>

  <!-- Arrow: User → Orchestrator -->
  <line x1="170" y1="320" x2="250" y2="320" stroke="#4ade80" stroke-width="2"
        marker-end="url(#arrGreen)"/>
  <text x="210" y="312" text-anchor="middle" font-size="11" fill="#4ade80">任务</text>

  <!-- ====== Orchestrator Box ====== -->
  <rect x="250" y="100" width="260" height="460" rx="14"
        fill="url(#orchGrad)" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="380" y="130" text-anchor="middle" font-size="15" font-weight="700"
        fill="#f59e0b" filter="url(#softGlow)">Orchestrator</text>
  <text x="380" y="150" text-anchor="middle" font-size="11" fill="#64748b">（规划层 / 大脑）</text>
  <line x1="270" y1="160" x2="490" y2="160" stroke="#f59e0b" stroke-width="0.6" opacity="0.4"/>

  <!-- Step 1: analyze -->
  <rect x="270" y="174" width="220" height="52" rx="8"
        fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="380" y="197" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="600">① 分析任务</text>
  <text x="380" y="215" text-anchor="middle" font-size="11" fill="#94a3b8">识别可并发的独立子任务</text>

  <!-- Step 2: generate prompts -->
  <rect x="270" y="240" width="220" height="66" rx="8"
        fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="380" y="263" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="600">② 生成四要素 Prompt</text>
  <text x="380" y="281" text-anchor="middle" font-size="11" fill="#94a3b8">Scope / Goal / Constraints</text>
  <text x="380" y="297" text-anchor="middle" font-size="11" fill="#94a3b8">/ Output Format</text>

  <!-- Step 3: dispatch -->
  <rect x="270" y="320" width="220" height="66" rx="8"
        fill="rgba(56,189,248,0.10)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="380" y="343" text-anchor="middle" font-size="12" fill="#38bdf8" font-weight="600">③ asyncio.gather() 分发</text>
  <text x="380" y="361" text-anchor="middle" font-size="11" fill="#94a3b8">同时启动 N 个 Worker</text>
  <text x="380" y="377" text-anchor="middle" font-size="11" fill="#94a3b8">独立 agentId 防 todo 污染</text>

  <!-- Step 4: collect -->
  <rect x="270" y="400" width="220" height="52" rx="8"
        fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="380" y="423" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="600">④ 汇总 XML 结果</text>
  <text x="380" y="441" text-anchor="middle" font-size="11" fill="#94a3b8">&lt;task-notification&gt; 格式</text>

  <!-- Step 5: synthesize -->
  <rect x="270" y="466" width="220" height="52" rx="8"
        fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="380" y="489" text-anchor="middle" font-size="12" fill="#4ade80" font-weight="600">⑤ 综合回复用户</text>
  <text x="380" y="507" text-anchor="middle" font-size="11" fill="#94a3b8">结构化 + 有洞察力</text>

  <!-- Arrow: Orchestrator → Workers -->
  <line x1="510" y1="240" x2="580" y2="200" stroke="#38bdf8" stroke-width="1.8"
        marker-end="url(#arrBlue)"/>
  <line x1="510" y1="300" x2="580" y2="340" stroke="#38bdf8" stroke-width="1.8"
        marker-end="url(#arrBlue)"/>
  <line x1="510" y1="350" x2="580" y2="480" stroke="#38bdf8" stroke-width="1.8"
        marker-end="url(#arrBlue)"/>

  <!-- Arrow: Orchestrator → Workers label -->
  <text x="540" y="310" text-anchor="middle" font-size="11" fill="#38bdf8">并发</text>
  <text x="540" y="325" text-anchor="middle" font-size="11" fill="#38bdf8">分发</text>

  <!-- ====== Worker 1 ====== -->
  <rect x="580" y="110" width="230" height="160" rx="12"
        fill="url(#workerGrad)" stroke="#38bdf8" stroke-width="1.3"/>
  <text x="695" y="138" text-anchor="middle" font-size="13" fill="#38bdf8" font-weight="700">Worker-1</text>
  <text x="695" y="156" text-anchor="middle" font-size="11" fill="#64748b">agentId: sub-001</text>
  <line x1="600" y1="164" x2="790" y2="164" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
  <text x="695" y="185" text-anchor="middle" font-size="12" fill="#94a3b8">任务：调研 LangGraph</text>
  <!-- Timeline bar -->
  <rect x="610" y="200" width="155" height="16" rx="4" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <rect x="610" y="200" width="120" height="16" rx="4" fill="#38bdf8" opacity="0.35"/>
  <text x="695" y="213" text-anchor="middle" font-size="10" fill="#e2e8f0">████████████ 3.2s ✓</text>
  <text x="695" y="248" text-anchor="middle" font-size="11" fill="#64748b">独立 context，零干扰</text>

  <!-- ====== Worker 2 ====== -->
  <rect x="580" y="300" width="230" height="160" rx="12"
        fill="url(#workerGrad)" stroke="#38bdf8" stroke-width="1.3"/>
  <text x="695" y="328" text-anchor="middle" font-size="13" fill="#38bdf8" font-weight="700">Worker-2</text>
  <text x="695" y="346" text-anchor="middle" font-size="11" fill="#64748b">agentId: sub-002</text>
  <line x1="600" y1="354" x2="790" y2="354" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
  <text x="695" y="375" text-anchor="middle" font-size="12" fill="#94a3b8">任务：调研 CrewAI</text>
  <rect x="610" y="390" width="155" height="16" rx="4" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <rect x="610" y="390" width="138" height="16" rx="4" fill="#38bdf8" opacity="0.35"/>
  <text x="695" y="403" text-anchor="middle" font-size="10" fill="#e2e8f0">██████████████ 3.8s ✓</text>
  <text x="695" y="438" text-anchor="middle" font-size="11" fill="#64748b">独立 context，零干扰</text>

  <!-- ====== Worker 3 ====== -->
  <rect x="580" y="490" width="230" height="160" rx="12"
        fill="url(#workerGrad)" stroke="#38bdf8" stroke-width="1.3"/>
  <text x="695" y="518" text-anchor="middle" font-size="13" fill="#38bdf8" font-weight="700">Worker-3</text>
  <text x="695" y="536" text-anchor="middle" font-size="11" fill="#64748b">agentId: sub-003</text>
  <line x1="600" y1="544" x2="790" y2="544" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
  <text x="695" y="565" text-anchor="middle" font-size="12" fill="#94a3b8">任务：调研 AutoGen</text>
  <rect x="610" y="580" width="155" height="16" rx="4" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <rect x="610" y="580" width="155" height="16" rx="4" fill="#38bdf8" opacity="0.35"/>
  <text x="695" y="593" text-anchor="middle" font-size="10" fill="#e2e8f0">████████████████ 4.1s ✓</text>
  <text x="695" y="628" text-anchor="middle" font-size="11" fill="#64748b">独立 context，零干扰</text>

  <!-- Return arrows: Workers → Orchestrator -->
  <line x1="810" y1="190" x2="870" y2="190" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <line x1="810" y1="380" x2="870" y2="380" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <line x1="810" y1="565" x2="870" y2="565" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>

  <!-- ====== Results Merge Box ====== -->
  <rect x="870" y="280" width="200" height="140" rx="12"
        fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1.4"/>
  <text x="970" y="308" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="700">汇总层</text>
  <text x="970" y="328" text-anchor="middle" font-size="11" fill="#64748b">asyncio.gather() 等待</text>
  <text x="970" y="346" text-anchor="middle" font-size="11" fill="#64748b">全部 Worker 完成</text>
  <line x1="890" y1="356" x2="1050" y2="356" stroke="#4ade80" stroke-width="0.5" opacity="0.3"/>
  <text x="970" y="376" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="700">总耗时 ≈ 4.1s</text>
  <text x="970" y="396" text-anchor="middle" font-size="11" fill="#94a3b8">（最慢 Worker）</text>
  <text x="970" y="412" text-anchor="middle" font-size="11" fill="#94a3b8">节省 63% vs 串行</text>

  <!-- Vertical lines connecting return arrows to merge box -->
  <line x1="870" y1="190" x2="870" y2="565" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="870" y1="380" x2="870" y2="380" stroke="#4ade80" stroke-width="2" opacity="0.6"/>

  <!-- Footer: serial vs parallel comparison -->
  <rect x="30" y="590" width="530" height="60" rx="8"
        fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="295" y="612" text-anchor="middle" font-size="12" fill="#f87171" font-weight="600">串行（旧）：11.1s</text>
  <text x="295" y="634" text-anchor="middle" font-size="11" fill="#64748b">
    3.2s + 3.8s + 4.1s = 11.1s | context 混杂，质量下降
  </text>

  <!-- Arrow: agentId isolation note -->
  <rect x="600" y="656" width="460" height="0" rx="0" fill="none"/>
  <text x="830" y="656" text-anchor="middle" font-size="11" fill="#f59e0b">
    关键：agentId 隔离，每个 Worker 有独立 todo 列表
  </text>
</svg>
