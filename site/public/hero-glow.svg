<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#7b5ea7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background glow -->
  <circle cx="200" cy="200" r="180" fill="url(#core)"/>
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="160" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3" fill="none" stroke-dasharray="4 6"/>
  <!-- Middle ring -->
  <circle cx="200" cy="200" r="110" stroke="#00ffd1" stroke-width="0.8" stroke-opacity="0.4" fill="none" stroke-dasharray="2 8"/>
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="60" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.6" fill="none"/>
  <!-- Core node -->
  <circle cx="200" cy="200" r="20" fill="#00d4ff" fill-opacity="0.15" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Agent letter -->
  <text x="200" y="207" font-family="monospace" font-size="18" fill="#00d4ff" text-anchor="middle" font-weight="bold" filter="url(#glow)">λ</text>
  <!-- Orbital nodes -->
  <circle cx="200" cy="40" r="6" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="200" cy="360" r="6" fill="#7b5ea7" opacity="0.7"/>
  <circle cx="40" cy="200" r="6" fill="#00ffd1" opacity="0.7"/>
  <circle cx="360" cy="200" r="6" fill="#00d4ff" opacity="0.5"/>
  <circle cx="87" cy="87" r="4" fill="#00ffd1" opacity="0.5"/>
  <circle cx="313" cy="313" r="4" fill="#7b5ea7" opacity="0.5"/>
  <circle cx="313" cy="87" r="4" fill="#00d4ff" opacity="0.4"/>
  <circle cx="87" cy="313" r="4" fill="#00ffd1" opacity="0.4"/>
  <!-- Connection lines -->
  <line x1="200" y1="46" x2="200" y2="140" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="46" y1="200" x2="140" y2="200" stroke="#00ffd1" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="354" y1="200" x2="260" y2="200" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="200" y1="354" x2="200" y2="260" stroke="#7b5ea7" stroke-width="0.5" stroke-opacity="0.3"/>
</svg>
